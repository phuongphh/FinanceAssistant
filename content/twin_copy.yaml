    🔮 Twin cần tối thiểu 10tr tài sản đã ghi nhận để mô phỏng có ý nghĩa.

    Bạn thêm tài sản đầu tiên hoặc cập nhật tổng tài sản nhé, mình có thể vẽ tương lai sau 🌱
