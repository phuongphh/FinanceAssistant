narrative:
  prompt: |-
    Bạn là Bé Tiền, trợ lý tài chính cá nhân. Viết 2-3 câu tiếng Việt, 50-200 ký tự, không markdown.

    Dữ liệu của người dùng:
    - Năm mục tiêu: {target_year}, P10={p10}, P50={p50}, P90={p90}
    - Mức tài sản: {wealth_level}
    - Thay đổi 30 ngày qua: {top_changes}
    - Sự kiện gần đây: {life_events_summary}

    Yêu cầu: đề cập số tiền cụ thể từ dữ liệu, nêu tên loại tài sản thực tế nếu có, không dùng câu chung chung như "tài sản của bạn", "bạn đang đi đúng hướng". Giọng ấm áp, xác suất, không hứa lợi nhuận.
  fallback: "Nếu giữ nhịp hiện tại, P50 năm {target_year} có thể đạt {p50}. Mình theo dõi cùng bạn nhé."
  wealth_level_labels:
    starter: "mới bắt đầu"
    young_prof: "đang xây dựng"
    mass_affluent: "tích lũy tốt"
    hnw: "tài sản lớn"

scenario_comparison:
  tooltip_optimal: "Kịch bản Tối Ưu giả định: tăng tỷ trọng tài sản sinh lời, tiết kiệm đều đặn hơn, và phân bổ theo danh mục mục tiêu đã cài đặt."
  delta_badge_positive: "+{delta_pct}%"
  delta_badge_negative: "{delta_pct}%"
  cta_savings: "Để đạt P50 tối ưu, bạn cần tiết kiệm thêm ~{amount}/tháng"
  cta_no_change: "Danh mục hiện tại đã khá gần mức tối ưu — tiếp tục duy trì nhé!"
  milestone_label: "Năm {year}"

comparison:
  recomputing: "⏳ Mình đang dựng lộ trình tối ưu để so sánh..."
  no_projection: |-
    🔮 Mình chưa có đủ dữ liệu để so sánh tối ưu.
    Bạn cập nhật tài sản rồi thử lại sau một chút nhé.
  caption: |-
    ⚖️ So sánh lộ trình hiện tại và tối ưu

    Năm {target_year}, đường giữa P50 có thể tăng từ {current_p50} → {optimal_p50} ({delta_pct}).

    {actions}

    {disclaimer}
    CTA "Bắt đầu kế hoạch" có thể mở ở Phase 4B; hiện tại mình chỉ dùng để tham khảo.
  action_savings: "• Tăng tiết kiệm đều: {current_savings}/tháng → {optimal_savings}/tháng."
  action_rebalance_add: "• Tăng tỷ trọng {asset_label}: {current_pct}% → {target_pct}% (khoảng {amount})."
  action_rebalance_trim: "• Giảm bớt {asset_label}: {current_pct}% → {target_pct}% (khoảng {amount})."
  action_hold: "• Danh mục đã khá gần mục tiêu; ưu tiên giữ nhịp và rà soát mỗi tháng."
  disclaimer_prefix: "Đây là gợi ý chung, không phải lời khuyên đầu tư."

