briefing:
  ahead: "🚀 Twin: tài sản đang cao hơn đường giữa P50 khoảng {delta_pct}% — nhịp này ổn đó."
  on_track: "🎯 Twin: bạn đang đi khá sát đường giữa P50 — cứ đều tay nhé."
  behind: "🌱 Twin: đang thấp hơn P50 khoảng {delta_pct}%, không sao — mình đi chậm mà chắc."
  accuracy_neutral: "📊 Tuần trước Bé Tiền dự báo P50 = {predicted}, thực tế = {actual} ({error_pct}%)."
  accuracy_celebrate: "🎉 Tuần trước Bé Tiền dự báo P50 = {predicted}, thực tế = {actual} — bạn vượt kỳ vọng rồi!"
  accuracy_reassure: "💪 Tuần trước dự báo P50 = {predicted}, thực tế = {actual} — chưa sao, mình điều chỉnh dần nhé."

how_it_works: |-
  🔮 Twin hoạt động thế nào?

  • Mình lấy tổng tài sản, phân bổ danh mục và dòng tiền gần đây.
  • Sau đó mô phỏng 1.000 kịch bản thị trường trong 10 năm.
  • Kết quả là vùng P10/P50/P90: không phải một con số cố định, mà là “có thể nằm trong khoảng”.

  Mục tiêu là giúp bạn thấy xu hướng và rủi ro trong vùng khả năng, không khẳng định tương lai.

  FAQ — Tại sao Bé Tiền không cho con số chính xác?
  Vì tương lai phụ thuộc thị trường, thu nhập và quyết định của mình. Một khoảng dự phóng có thể giúp bạn nhìn rủi ro tốt hơn một con số lẻ.

