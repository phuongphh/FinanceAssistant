# Phase 4A — Financial Twin user-facing copy.
# Vietnamese-only copy. Keep wording probabilistic: "có thể", "dự phóng".

menu:
  title: "🔮 BÉ TIỀN TƯƠNG LAI"
  intro:
    starter: |-
      Mình sẽ vẽ thử Bé Tiền của bạn trong 10 năm tới bằng xác suất, không phải lời hứa.
      Khi tài sản đạt từ 10tr, dự phóng sẽ hữu ích hơn nhé.
    young_prof: |-
      Mình mô phỏng 1.000 kịch bản để xem tài sản của bạn có thể đi về đâu trong 10 năm tới.
      Bạn muốn xem lộ trình nào?
    mass_affluent: |-
      Đây là bản đồ xác suất cho tài sản tương lai: vùng an toàn, đường giữa và khoảng có thể đạt.
      Mình luôn ưu tiên góc nhìn thận trọng.
    hnw: |-
      Financial Twin mô phỏng nhiều kịch bản thị trường cho danh mục hiện tại của bạn.
      Dùng để tham khảo chiến lược, không thay thế tư vấn đầu tư cá nhân.
  hint: |-
    💡 Twin dùng P10/P50/P90: 80% kịch bản có thể nằm giữa P10 và P90.
  buttons:
    - label: "📈 Lộ trình"
      callback: "menu:twin:view_current"
    - label: "⚖️ So tối ưu"
      callback: "menu:twin:compare_optimal"
    - label: "📱 Mini App"
      callback: "menu:twin:open_miniapp"
    - label: "❓ Cách hoạt động"
      callback: "menu:twin:how_it_works"
    - label: "◀️ Quay về"
      callback: "menu:main"

