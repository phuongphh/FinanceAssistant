  title: "Bé Tiền tương lai — vùng xác suất"
  current_label: "Hiện tại"
  p50_label: "P50 — đường giữa"
  optimal_label: "P50 — tối ưu"
  optimal_cone_label: "Vùng tối ưu P10–P90"
  cone_label: "Vùng P10–P90"
  x_label: "Năm"
  y_label: "Giá trị tài sản"
  watermark: "Bé Tiền — dự phóng, không phải dự đoán"

trajectory:
  empty_state: |-
    🔮 Twin cần tối thiểu 10tr tài sản đã ghi nhận để mô phỏng có ý nghĩa.

    Bạn thêm tài sản đầu tiên hoặc cập nhật tổng tài sản nhé, mình sẽ vẽ tương lai sau 🌱
  no_projection: |-
    🔮 Mình chưa có dự phóng Twin cho bạn.
    Đang tạo bản đầu tiên, bạn thử lại sau một chút nhé.
  recomputing: "⏳ Mình đang dựng 1.000 kịch bản tương lai cho bạn..."
  caption: |-
    🔮 Bé Tiền tương lai của {name}

    Năm {target_year}, tài sản có thể nằm trong khoảng {p10} — {p90}.
    Đường giữa P50: {p50}.

    Dữ liệu dự phóng: {age_text}. Đây là mô phỏng xác suất, không phải cam kết lợi nhuận.
  age_today: "vừa cập nhật hôm nay"
  age_days: "cập nhật {days} ngày trước"
  stale_note: "

⚠️ Dự phóng hơi cũ, mình sẽ cập nhật lại ở lượt chạy kế tiếp."

briefing:
  ahead: "🚀 Twin: tài sản đang cao hơn đường giữa P50 khoảng {delta_pct}% — nhịp này ổn đó."
  on_track: "🎯 Twin: bạn đang đi khá sát đường giữa P50 — cứ đều tay nhé."
  behind: "🌱 Twin: đang thấp hơn P50 khoảng {delta_pct}%, không sao — mình đi chậm mà chắc."

how_it_works: |-
  🔮 Twin hoạt động thế nào?

  • Mình lấy tổng tài sản, phân bổ danh mục và dòng tiền gần đây.
  • Sau đó mô phỏng 1.000 kịch bản thị trường trong 10 năm.
  • Kết quả là vùng P10/P50/P90: không phải “sẽ là”, mà là “có thể nằm trong khoảng”.

  Mục tiêu là giúp bạn thấy xu hướng và rủi ro, không dự đoán chắc chắn tương lai.

miniapp:
  not_configured: "📱 Mini App Twin chưa được cấu hình public URL. Bạn xem biểu đồ ngay trong Telegram trước nhé."
  open_text: "📱 Mở Twin Dashboard trong Mini App:"
  button: "Mở Twin"

narrative:
  prompt: |-
    Bạn là Bé Tiền, trợ lý tài chính thân thiện. Viết 2-3 câu tiếng Việt, 50-200 ký tự, không markdown.
    Dữ liệu: năm {target_year}, P10={p10}, P50={p50}, P90={p90}, tuổi cone={cone_age_days} ngày, mã cone={cone_hash}.
    Yêu cầu: nói theo xác suất, không hứa lợi nhuận, giọng khích lệ và thận trọng.
  fallback: "Nếu giữ nhịp hiện tại, tài sản của bạn có thể đi trong vùng này. Mình sẽ theo dõi đều để bạn điều chỉnh sớm khi cần."

comparison:
  recomputing: "⏳ Mình đang dựng lộ trình tối ưu để so sánh..."
  no_projection: |-
    🔮 Mình chưa có đủ dữ liệu để so sánh tối ưu.
    Bạn cập nhật tài sản rồi thử lại sau một chút nhé.
  caption: |-
    ⚖️ So sánh lộ trình hiện tại và tối ưu

    Năm {target_year}, đường giữa P50 có thể tăng từ {current_p50} → {optimal_p50} ({delta_pct}).

    {actions}

    {disclaimer}
    CTA "Bắt đầu kế hoạch" sẽ được mở ở Phase 4B; hiện tại mình chỉ dùng để tham khảo.
  action_savings: "• Tăng tiết kiệm đều: {current_savings}/tháng → {optimal_savings}/tháng."
  action_rebalance_add: "• Tăng tỷ trọng {asset_label}: {current_pct}% → {target_pct}% (khoảng {amount})."
  action_rebalance_trim: "• Giảm bớt {asset_label}: {current_pct}% → {target_pct}% (khoảng {amount})."
  action_hold: "• Danh mục đã khá gần mục tiêu; ưu tiên giữ nhịp và rà soát mỗi tháng."
  disclaimer_prefix: "Đây là gợi ý chung, không phải lời khuyên đầu tư."

