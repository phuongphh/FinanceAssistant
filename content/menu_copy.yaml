    - label: "💡 Cơ hội đầu tư"
      callback: "menu:market:advisor"
      description: "Gợi ý đầu tư mới dựa trên thị trường"

    - label: "◀️ Quay về"
      callback: "menu:main"

  hint: |-
    💡 _Hoặc hỏi nhanh:_
    • "VNM giá bao nhiêu?"
    • "BTC hôm nay thế nào?"
    • "nên đầu tư gì?"
