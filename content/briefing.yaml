# Phase 3.9 real-data morning briefing template.
# Greeting plus 5 compact data sections, intentionally Telegram-friendly.
sections:
  greeting: |
    {greeting}
    Chúc bạn một ngày đầu tư tỉnh táo và nhẹ nhàng.
  net_worth: |
    💰 Tổng tài sản: {net_worth}
    {change_label}: {change_abs} ({change_pct}%)
  market: |
    🌤️ Thị trường sáng nay:
    • VN-Index: {vnindex}
    • Vàng SJC: {gold}
    • BTC: {btc}
  portfolio: |
    📊 Danh mục:
    {allocation_lines}
    Hôm nay: {today_change}
    {movers_line}
  news: |
    📰 Top tin liên quan:
    {news_lines}
  insights: |
    💡 Gợi ý nhanh:
    {insight_lines}
# Format strings for individual insight bullets. Kept here (not hardcoded in
# Python) per the Vietnamese-localization rule in CLAUDE.md so copy can be
# tuned without code changes.
insights_lines:
  performance_pair: "Tốt nhất: {best_symbol} {best_pct}%; yếu nhất: {worst_symbol} {worst_pct}%."
  performance_single: "Hiệu suất: {symbol} {pct}%."
  diversification: "Đa dạng hóa: {score}/100 ({label})."
footer:
  stale: "⚠️ Một số giá đang dùng dữ liệu gần nhất vì nguồn realtime tạm chậm."
