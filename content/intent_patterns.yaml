# Phase 3.5 — rule-based intent patterns.
#
# How matching works:
#   - Each intent has a list of patterns. A pattern is a regex matched
#     against the user message after lowercasing AND diacritic stripping
#     (so "tài sản của tôi" and "tai san cua toi" both hit).
#   - Patterns are scored by their `confidence`. The classifier returns
#     the single highest-confidence match across ALL intents.
#   - `parameter_extractors` runs after a pattern matches; values from
#     named regex groups are merged with the dedicated extractors.
#
# Adding a new pattern:
#   1. Write the regex in DIACRITIC-STRIPPED form (see normalize step).
#   2. Pick a confidence in [0, 1]: ≥0.9 = unambiguous, 0.7-0.85 =
#      probable, <0.7 = soft hint that must escalate before acting.
#   3. Add at least one fixture in tests/test_intent/fixtures/query_examples.yaml.
#
# Reference: docs/current/phase-3.5-detailed.md § 1.2

query_assets:
  description: "User asks about their assets (any type)."
  patterns:
    # "tài sản của tôi có gì?" / "tai san cua toi co gi"
    - pattern: 'tai\s*san.*(?:cua\s+(?:toi|minh)|toi\s+co).*?(?:gi|nao|nhung)'
      confidence: 0.95
    # "tôi có tài sản gì"
    - pattern: '(?:toi|minh)\s+co.*tai\s*san.*(?:gi|nao)'
      confidence: 0.95
    # direct type-specific forms: "crypto của tôi" / "tiền số của mình"
    - pattern: '(?:crypto|tien\s*so|bitcoin|ethereum|solana|btc|eth|sol)\s+(?:cua\s+)?(?:toi|minh|em|anh|chi|ban)'
      confidence: 0.92
    # "show my assets" — English fallback
    - pattern: 'show\s+(?:my|the)\s+assets?'
      confidence: 0.9
    # "asset của tôi"
    - pattern: 'assets?\s+(?:cua\s+(?:toi|minh)|toi)'
      confidence: 0.9
    # short "tài sản của tôi" / "danh sách tài sản"
    - pattern: '(?:danh\s*sach|liet\s*ke|xem)\s+tai\s*san'
      confidence: 0.9
    # plain "tài sản" with possessive — broader, lower confidence.
    - pattern: 'tai\s*san\s+(?:cua\s+)?(?:toi|minh)'
      confidence: 0.75
    # diacritic-typo / doubled-letter case ("tài sảnn của tôii")
    - pattern: 'tai\s*sann?\s+cua\s+toii?'
      confidence: 0.7
    # short forms "tài sản có gì" / "tai san co gi" (no possessive)
    - pattern: '^tai\s*san\s+co\s+gi'
      confidence: 0.7
    # Time-range report asks: "báo cáo tài sản tháng này", "show asset report tuần này"
    - pattern: '(?:bao\s*cao|tong\s*hop|xem|show).*(?:tai\s*san|asset|bds|bat\s*dong\s*san|nha\s*dat|dat|co\s*phieu|chung\s*khoan|stocks?|vang|gold|quy|fund|etf).*(?:hom\s*nay|hom\s*qua|tuan\s+nay|tuan\s+truoc|thang\s+nay|thang\s+truoc|nam\s+nay)'
      confidence: 0.94
    # NEW (S21): "tài sản hiện tại bao nhiêu" — informational, no possessive
    - pattern: 'tai\s*san\s+hien\s*tai.*bao\s*nhieu'
      confidence: 0.85
    # NEW (S21): pronoun variants — "em có tài sản gì", "anh có tài sản nào"
    - pattern: '(?:em|anh|chi|ban)\s+co.*tai\s*san.*(?:gi|nao)'
      confidence: 0.85
    # NEW (S21): "tài sản của em/anh/chị/bạn"
    - pattern: 'tai\s*san\s+cua\s+(?:em|anh|chi|ban)'
      confidence: 0.9
  parameter_extractors:
    time_range:
      use_extractor: time_range
    asset_type:
      patterns:
        - { match: '\b(?:bat\s*dong\s*san|bds|nha\s+dat|dat|can\s*ho|chung\s*cu)\b', value: real_estate }
        - { match: '\b(?:chung\s*khoan|co\s*phieu|stocks?|quy|quy\s*mo|chung\s*chi\s*quy|fund|etf)\b', value: stock }
        - { match: '\b(?:crypto|tien\s*so|btc|bitcoin|ethereum|eth|sol|solana)\b', value: crypto }
        - { match: '\b(?:vang|gold)\b', value: gold }
        - { match: '\b(?:tien\s*mat|cash|tien\s+gui)\b', value: cash }
    asset_subtype:
      patterns:
        - { match: '\b(?:dat|nha\s*dat)\b', value: land }
        - { match: '\b(?:chung\s*cu|can\s*ho)\b', value: apartment }
        - { match: '\b(?:quy|quy\s*mo|chung\s*chi\s*quy|fund)\b', value: fund }
        - { match: '\betf\b', value: etf }

query_net_worth:
  description: "User asks total net worth."
  patterns:
    - pattern: 'tong\s+(?:tai\s*san|asset|net\s*worth)'
      confidence: 0.95
    - pattern: 'tai\s*san.*tong'
      confidence: 0.85
    - pattern: '(?:toi|minh).*co\s+(?:tong\s*cong|tat\s*ca).*bao\s*nhieu'
      confidence: 0.85
    - pattern: 'net\s*worth'
      confidence: 0.95
    # NEW (S21): "tổng cộng có bao nhiêu tiền" — pronoun-less variant
    - pattern: 'tong\s*cong\s+co\s+bao\s*nhieu\s+tien'
      confidence: 0.9
    # NEW (S21): "tiền có bao nhiêu" — short form
    - pattern: '^tien\s+co\s+bao\s*nhieu'
      confidence: 0.7

query_portfolio:
  description: "User asks about their stock portfolio."
  patterns:
    - pattern: 'portfolios?\s*(?:chung\s*khoan|dau\s*tu)'
      confidence: 0.95
    - pattern: 'danh\s*muc.*(?:chung\s*khoan|co\s*phieu|dau\s*tu)'
      confidence: 0.95
    - pattern: '(?:chung\s*khoan|co\s*phieu).*(?:cua\s+(?:toi|minh)|toi\s+(?:co|dang|so\s*huu))'
      confidence: 0.9
    - pattern: '(?:nhung|cac)\s+ma\s*(?:nao|gi)'
      confidence: 0.85
    - pattern: 'danh\s*muc\s+dau\s*tu'
      confidence: 0.9

query_expenses:
  description: "User asks about expenses / transactions (general, no specific category)."
  patterns:
    # "tổng hợp giao dịch tháng trước" / "báo cáo giao dịch hôm qua"
    # are read-only transaction summaries, not quick-transaction writes.
    - pattern: '(?:tong\s*hop|bao\s*cao|liet\s*ke|xem).*(?:giao\s*dich|chi\s*(?:tieu|phi)).*(?:thang|tuan|nam|hom)'
      confidence: 0.92
    - pattern: 'chi\s*(?:tieu|phi).*(?:thang|tuan|nam|hom)'
      confidence: 0.9
    - pattern: '(?:toi|minh).*(?:da\s+)?(?:chi|tieu).*(?:thang|tuan)'
      confidence: 0.85
    - pattern: 'tieu\s+bao\s*nhieu'
      confidence: 0.85
    # NEW (S21): "liệt kê chi tiêu" — imperative without time range
    - pattern: '^(?:liet\s*ke|list|xem)\s+chi\s*(?:tieu|phi)\s*$'
      confidence: 0.85
  parameter_extractors:
    time_range:
      use_extractor: time_range

query_expenses_by_category:
  description: "User asks expenses filtered by category."
  patterns:
    # "chi tiêu cho sức khỏe tháng này"
    - pattern: 'chi\s*(?:tieu|phi).*(?:cho|ve).*?\w+.*(?:thang|tuan|nam)'
      confidence: 0.95
    # "chi phí sức khỏe tháng trước" (no "cho/về" between chi phí and category)
    - pattern: 'chi\s*(?:tieu|phi)\s+\w+.*(?:thang|tuan|nam)\s+(?:nay|truoc|qua)'
      confidence: 0.93
    # "liệt kê chi phí ăn uống tháng này"
    - pattern: '(?:liet\s*ke|list|xem|cac).*chi\s*(?:phi|tieu).*\w+'
      confidence: 0.92
    # "tháng này tôi tiêu cho ăn uống bao nhiêu"
    - pattern: '(?:thang|tuan)\s+(?:nay|truoc|qua).*(?:tieu|chi).*\w+'
      confidence: 0.9
  parameter_extractors:
    category:
      use_extractor: category
    time_range:
      use_extractor: time_range

query_income:
  description: "User asks about income."
  patterns:
    - pattern: 'thu\s*nhap.*(?:cua\s+(?:toi|minh)|toi)'
      confidence: 0.95
    - pattern: '(?:toi|minh).*kiem\s*duoc.*bao\s*nhieu'
      confidence: 0.85
    - pattern: 'luong.*(?:cua\s+)?(?:toi|minh)'
      confidence: 0.9
    # NEW (S21): "lương tháng bao nhiêu" — short form, no possessive
    - pattern: '^luong\s+(?:thang|nay)?.*bao\s*nhieu'
      confidence: 0.85
    # NEW (S21): "tổng thu nhập tháng" — informational, no possessive
    - pattern: 'tong\s+thu\s*nhap\s+(?:thang|nam)'
      confidence: 0.9

query_cashflow:
  description: "User asks net cashflow / savings for a period."
  patterns:
    - pattern: '(?:thang|tuan)\s+(?:nay|truoc|qua).*(?:du|con\s*lai|tiet\s*kiem\s+duoc)'
      confidence: 0.9
    - pattern: 'dong\s+tien'
      confidence: 0.95
    - pattern: 'tiet\s*kiem.*(?:thang|tuan)\s+(?:nay|truoc|qua)'
      confidence: 0.85
    - pattern: '(?:thang|tuan)\s+(?:nay|truoc).*(?:du\s+bao\s*nhieu|con\s+lai\s+bao\s*nhieu)'
      confidence: 0.9
  parameter_extractors:
    time_range:
      use_extractor: time_range

query_market:
  description: "User asks about market price."
  patterns:
    # Category shortcuts — must beat the generic ticker patterns below
    # because "vang" / "tien so" are NOT in the ticker whitelist and would
    # otherwise be silently filtered out, dropping the user into the LLM
    # fallback (and a confusing "which ticker?" reply).
    # "giá vàng" / "vàng giá bao nhiêu" / "vàng hôm nay"
    - pattern: 'gia\s+(?:vang|gold)\b'
      confidence: 0.95
    - pattern: '\bvang\s+(?:gia|hom\s+nay|bao\s*nhieu|the\s+nao|hien\s+tai)'
      confidence: 0.93
    # "giá tiền số" / "giá crypto" / "crypto hôm nay"
    - pattern: 'gia\s+(?:crypto|tien\s*so)\b'
      confidence: 0.95
    - pattern: '(?:crypto|tien\s*so)\s+(?:gia|hom\s+nay|bao\s*nhieu|the\s+nao)'
      confidence: 0.92
    # "giá cổ phiếu" / "cổ phiếu hôm nay" — generic stock shortcut
    - pattern: 'gia\s+co\s*phieu\b'
      confidence: 0.93
    # "VNM giá bao nhiêu"
    - pattern: '(?P<ticker>[a-z]{2,8})\s*(?:gia|hom\s+nay|hien\s*tai)'
      confidence: 0.92
    # "giá VNM"
    - pattern: 'gia\s+(?P<ticker>[a-z]{2,8})'
      confidence: 0.92
    # "VN-Index hôm nay"
    - pattern: 'vn[\s\-]?index'
      confidence: 0.95
    # "BTC hôm nay" / "bitcoin giá"
    - pattern: '(?:btc|bitcoin|eth|ethereum).*(?:gia|hom\s+nay|bao\s*nhieu)'
      confidence: 0.92
    # "giá bitcoin"
    - pattern: 'gia\s+(?:btc|bitcoin|eth|ethereum)'
      confidence: 0.92
  parameter_extractors:
    ticker:
      use_extractor: ticker
    category:
      patterns:
        # Order matters: "vàng" first so "giá vàng" doesn't get tagged
        # crypto via a stray substring match. Word-bound via \b in the
        # regex compile step (ASCII-only, safe after diacritic strip).
        - { match: '\bvang\b|\bgold\b', value: gold }
        - { match: '\b(?:crypto|tien\s*so|bitcoin|ethereum|btc|eth)\b', value: crypto }
        - { match: '\bco\s*phieu\b|\bstocks?\b|\bchung\s*khoan\b', value: stock }

query_goal_progress:
  description: "User asks about progress toward a specific named goal."
  # IMPORTANT: must be ABOVE query_goals so the more specific intent wins.
  patterns:
    # "muốn đạt được X tôi cần làm gì"
    - pattern: '(?:muon|de)\s+(?:dat\s+duoc|co\s+duoc|mua\s+duoc|lam\s+duoc).*?\w+.*(?:can|phai).*(?:lam\s*gi|lam\s*sao|nhu\s*the\s*nao)'
      confidence: 0.95
    # "X cần bao nhiêu nữa"
    - pattern: '(?:con|can).*?(?:bao\s*nhieu|bao\s*lau)\s+nua'
      confidence: 0.7
    # NEW (S21): "còn bao nhiêu mới đủ mua xe" — alt phrasing
    - pattern: 'con\s+bao\s*nhieu.*(?:moi|de)\s+du.*(?:mua|co)\s+\w+'
      confidence: 0.85
  parameter_extractors:
    goal_name:
      use_extractor: goal_name

query_goals:
  description: "User asks about their goals."
  patterns:
    - pattern: 'muc\s*tieu.*(?:cua\s+(?:toi|minh)|toi)'
      confidence: 0.95
    - pattern: '(?:toi|minh).*dat.*muc\s*tieu'
      confidence: 0.9
    - pattern: 'goals?\s+(?:cua\s+(?:toi|minh)|toi)'
      confidence: 0.95
    # NEW (S21): "mục tiêu hiện tại" / "goal hiện tại" — informational
    - pattern: '^(?:muc\s*tieu|goals?)\s+hien\s*tai'
      confidence: 0.85
    # NEW (S21): "liệt kê mục tiêu" / "xem mục tiêu" — imperative
    - pattern: '(?:liet\s*ke|xem|list)\s+(?:muc\s*tieu|goals?)'
      confidence: 0.9
    # Time-range report asks: "báo cáo mục tiêu tháng này", "goal report tuần trước"
    - pattern: '(?:bao\s*cao|tong\s*hop|xem|show).*(?:muc\s*tieu|goals?).*(?:hom\s*nay|hom\s*qua|tuan\s+nay|tuan\s+truoc|thang\s+nay|thang\s+truoc|nam\s+nay)'
      confidence: 0.94
  parameter_extractors:
    time_range:
      use_extractor: time_range

action_quick_transaction:
  description: "User logs a quick income or expense in natural language."
  # Anchored phrasing that the LLM tier would otherwise have to handle:
  # "thêm 3tr vào ví momo", "nhận 5tr vào tiền mặt", "cộng 2tr vào tài
  # khoản VCB". We let the rule tier catch the high-signal shapes so
  # latency stays sub-200ms and the LLM budget stays trim. The
  # canonical parser inside the handler re-extracts amount + merchant
  # from the raw text, so we don't need named groups here.
  patterns:
    # "thêm 3tr vào ví momo" / "them 200k vao vi zalopay"
    - pattern: '^(?:them|cong|nap|nhan|cho|gui|bo)\s+[\d.,]+.*(?:vao|into)\s+(?:vi|tai\s*khoan|cash|tien\s*mat|momo|zalopay|viettel|vcb|acb|tcb|mb|tpb|techcom)'
      confidence: 0.9
    # "nhận lương 20tr vào tiền mặt"
    - pattern: '^(?:nhan|duoc|thuong|luong)\s+(?:luong\s+)?[\d.,]+.*(?:vao|tai|o|trong)\s+(?:vi|tai\s*khoan|cash|tien\s*mat|momo|zalopay|viettel|vcb|acb|tcb|mb|tpb|techcom)'
      confidence: 0.9
    # "được bố cho 500k" / "được thưởng 200k" / "được lì xì 50k trên
    # momo" / "được mẹ cho 1tr" — the Chi tiêu menu PROMISES these are
    # recorded as money-in. "được" + an optional giver (bố/mẹ/sếp) + a
    # giving verb (cho/tặng/biếu/thưởng/lì xì/mừng tuổi/hỗ trợ/hoàn) +
    # an amount with a money suffix. The message-layer fast-path records
    # the transaction; this rule keeps the LLM tier from having to. Money
    # suffix is mandatory so resultative "được" ("mua được áo") and bare
    # numbers don't match. Kept in sync with ``_GIVING_VERBS`` in
    # ``backend/intent/income_semantics.py``.
    - pattern: '\bduoc\s+(?:\w+\s+){0,2}?(?:cho|tang|bieu|thuong|li\s*xi|mung\s*tuoi|mung|ho\s*tro|hoan)\b[^?\n]{0,40}?\b\d+(?:[.,]\d+)?\s*(?:k|tr|trieu|nghin|ngan|m|vnd|vnđ|d)\b'
      confidence: 0.9
    # "Found money": "tìm/nhặt/lượm được 200k dưới gối" — cash picked up is
    # money-in. The amount must come DIRECTLY after "được" (only a sign in
    # between) and carry a money suffix, so "tìm được thắt lưng 500k" (an
    # object worth 500k, no purchase yet) does NOT match. Kept in sync with
    # ``_FOUND_MONEY_RE`` in ``backend/intent/income_semantics.py``.
    - pattern: '\b(?:tim|nhat|luom)\s+duoc\s+[+\-]?\s*\d+(?:[.,]\d+)?\s*(?:k|tr|trieu|nghin|ngan|m|vnd|vnđ|d)\b'
      confidence: 0.9
    # "trừ 50k khỏi ví momo" — explicit expense from named asset.
    - pattern: '^(?:tru|bot|giam|chi|tieu|rut)\s+[\d.,]+.*(?:khoi|tu|o|trong|vao)\s+(?:vi|tai\s*khoan|cash|tien\s*mat|momo|zalopay|viettel|vcb|acb|tcb|mb|tpb|techcom)'
      confidence: 0.9

    # ---- Expense-lead verb + amount anywhere in the clause ----
    # Catches the colloquial Vietnamese shapes where users name what
    # they bought BEFORE saying how much:
    #   "chi vé công viên nước 500k", "chi 1000k ăn thịt cá sấu",
    #   "mất 200k đổ xăng", "tốn 500k mua quà", "trả 200k tiền điện",
    #   "đóng 500k học phí", "nộp 1tr tiền nhà", "xài 200k cà phê",
    #   "thanh toán 1tr ăn tối", "bỏ 300k mua sách".
    # Negative lookahead skips "chi tiêu/chi phí ..." (the noun phrase
    # used by the query intents) so report-style asks still route to
    # query_expenses / query_expenses_by_category.
    # Money suffix is mandatory (k/tr/triệu/nghìn/ngàn/đ/vnd) — bare
    # numbers without a unit are too noisy to trust at this confidence.
    - pattern: '^(?:chi|tieu|xai|tra|mua|mat|ton|bo|dong|nop|thanh\s*toan|rut)\s+(?!(?:tieu|phi)\b)[^?\n]{0,60}?\b\d+(?:[.,]\d+)?\s*(?:k|tr|trieu|nghin|ngan|m|vnd|vnđ|d)\b'
      confidence: 0.9

    # Subject-led variant: "tôi mất 500k đi nhậu", "mình chi 1tr ăn tối",
    # "em vừa trả 200k tiền điện", "tao tốn 500k đổ xăng".
    # The optional adverb cluster (đã/mới/vừa) covers past-tense
    # phrasing that Vietnamese speakers default to when logging
    # transactions retroactively.
    - pattern: '\b(?:toi|minh|em|tao|tui|t)\s+(?:da\s+|moi\s+|vua\s+|cung\s+)?(?:chi|tieu|tra|mua|mat|ton|bo|dong|nop|xai|thanh\s*toan)\s+(?!(?:tieu|phi)\b)[^?\n]{0,60}?\b\d+(?:[.,]\d+)?\s*(?:k|tr|trieu|nghin|ngan|m|vnd|vnđ|d)\b'
      confidence: 0.88

    # "hết X" idiom — when X is an amount, the sentence is almost
    # always logging an expense: "ăn trưa hết 50k",
    # "ăn thịt cá sấu hết 1000k", "mua sách hết 200k",
    # "đổ xăng hết 100k", "đi grab hết 80k".
    # Requires a money suffix to avoid matching unrelated "hết" usages
    # like "hết tiền" or "hết hàng".
    - pattern: '\bhet\s+\d+(?:[.,]\d+)?\s*(?:k|tr|trieu|nghin|ngan|m|vnd|vnđ)\b'
      confidence: 0.88

    # Leading bare amount + description — the canonical fast-log shape:
    #   "50k cà phê", "200k đổ xăng", "1tr ăn nhậu", "30k trà sữa".
    # Anchored to start with an optional sign so the income fast-path
    # ("+200k …") still wins via the message-layer pre-check.
    - pattern: '^\s*[+\-]?\s*\d+(?:[.,]\d+)?\s*(?:k|tr|trieu|nghin|ngan)\s+[^\d?].{1,40}$'
      confidence: 0.86

    # Trailing-amount description — "ăn thịt cá sấu 1000k",
    # "cà phê highlands 50k", "vé công viên nước 500k",
    # "grab về nhà 80k". Requires the line to START with a known
    # spending-context lead word (ăn/uống/mua/đi/vé/đổ/cà phê/trà
    # sữa/cơm/phở/bún/grab/taxi/xe/tiền) so questions and reports
    # ("ăn uống tháng này bao nhiêu") don't accidentally match —
    # those have time tokens, not money suffixes.
    - pattern: '^(?:an|uong|mua|di|ve|do|cafe|ca\s*phe|com|pho|bun|tra\s*sua|grab|taxi|xe|tien|nuoc|bia|ruou|do\s*xang|xang)\b[^?\n]{1,60}?\b\d+(?:[.,]\d+)?\s*(?:k|tr|trieu|nghin|ngan)\s*$'
      confidence: 0.86

action_record_saving:
  description: "User wants to record a saving."
  patterns:
    # bare "tiết kiệm 1tr" — anchored to start to avoid grabbing
    # "tháng này tôi tiết kiệm được" (which is query_cashflow).
    - pattern: '^tiet\s*kiem\s+\d+'
      confidence: 0.85
    - pattern: '(?:gui|chuyen|de\s+danh|cat).*(?:tiet\s*kiem|saving)\s*\d+'
      confidence: 0.9
  parameter_extractors:
    amount:
      use_extractor: amount

action_add_asset:
  description: "User wants to add a new asset (real estate, stock, crypto, gold, cash)."
  # High confidence so it beats query_assets / query_portfolio / query_market
  # when the user is initiating an add (e.g. "thêm bất động sản").
  patterns:
    # "thêm bất động sản" / "them bds" / "them nha dat"
    - pattern: '^(?:them|tao|nhap|ghi)\s+(?:moi\s+)?(?:bat\s*dong\s*san|bds|nha\s*dat|nha|dat|can\s*ho|chung\s*cu)\b'
      confidence: 0.95
    # "thêm cổ phiếu" / "thêm chứng khoán"
