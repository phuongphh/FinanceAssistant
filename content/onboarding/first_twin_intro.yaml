# First-Twin narrative (Phase 4.1, Story A.2).
# Mascot intro shown BEFORE the cone chart image so user has a frame
# for the chart they're about to see. Composer-only — no LLM call.

# {salutation} = how Bé Tiền addresses the user (anh/chị/bạn); {Salutation}
# is the sentence-start capitalized form. Both are filled by
# twin_narrative_service_v2.narrative_text() — default "bạn"/"Bạn".
narrative: |
  ✨ Đây là <b>Twin tài chính</b> của {salutation} — Bé Tiền vẽ ra 3 con đường tương lai dựa trên tình hình hiện tại.

  • Đường <b>giữa</b> là điều kiện thường (kịch bản P50).
  • Đường <b>trên</b> là nếu {salutation} tiết kiệm chăm hơn (P90).
  • Đường <b>dưới</b> là nếu có biến cố (P10).

  {Salutation} không cần đoán tương lai — Bé Tiền đoán giúp, {salutation} chỉ cần quyết định.

# Demo variant — shown when user picks "Để Bé Tiền dùng demo trước".
# Must NOT call it "Twin của bạn" — that broke trust in user testing.
# Uses a 2-asset hypothetical portfolio (cash + VN stocks) so the demo
# shows what diversification looks like, not a flat single-line curve.
demo_narrative: |
  🎭 <b>Twin demo</b> — minh hoạ với danh mục giả định <b>50 triệu</b>, gồm 2 loại tài sản:

  • <b>30 triệu</b> tiết kiệm tiền mặt (cash)
  • <b>20 triệu</b> cổ phiếu Việt Nam

  • Đường <b>giữa</b> là điều kiện thường (P50).
  • Đường <b>trên</b> là kịch bản thị trường thuận lợi (P90).
  • Đường <b>dưới</b> là khi có biến cố (P10).

  Đây không phải số liệu của {salutation} — nhập tài sản thật để Bé Tiền vẽ Twin riêng cho {salutation}.

caption: |
  📈 Twin của {name} — kịch bản {horizon} năm tới.

demo_caption: |
  📈 Twin demo — danh mục giả định 50 triệu (cash + cổ phiếu VN), kịch bản {horizon} năm tới.

# Demo ack — replaces the misleading "✅ Bé Tiền ghi nhận: 50tr"
# wording for the demo path so user doesn't think we banked their cash.
demo_ack: |
  🎭 Đang vẽ Twin demo với danh mục giả định <b>50 triệu</b> (30tr tiền mặt + 20tr cổ phiếu) — chờ Bé Tiền vài giây nhé…

# Sent right after the demo cone chart to reframe expectations: the
# user's REAL Twin will be richer than this thin demo allocation. Keep
# this in a single bubble so Telegram does not split it.
demo_post_chart_emphasis: |
  💡 Đây chỉ là demo với 2 loại tài sản đơn giản. <b>Bức tranh tài chính thật của bạn sẽ tốt hơn nữa</b> — với chính kế hoạch đầu tư, tiết kiệm và mục tiêu của bạn.

# In-moment feedback prompt — sent 5–10s after the chart image.
feedback_prompt:
  body: "💬 Bạn cảm thấy thế nào về Twin đầu tiên? Có câu hỏi về Twin? Cứ hỏi Bé Tiền nhé"
  buttons:
    love: "😍 Rất thích"
    confused: "🤔 Hơi khó hiểu"
    dislike: "😕 Chưa thích"
  callback_prefix: "onboarding_v2:fb:"
  ack: |
    Cảm ơn bạn — Bé Tiền ghi nhận để cải thiện 💚

# Fallback if Twin compute fails. Keep short — user already on edge.
# Tells the truth: there is NO background retry, the user has to tap.
compute_failed: |
  ⚠️ Bé Tiền chưa vẽ được Twin lần này. Bạn bấm <b>Thử lại</b> giúp Bé Tiền nhé.
compute_failed_retry_label: "🔄 Thử lại"
compute_failed_retry_callback: "onboarding_v2:retry_twin"

# Activation message — shown ONLY after the user takes the first
# next-best-action (tap CTA button OR free-text a question). Firing
# this before the user engaged makes the onboarding feel like it ended
# prematurely; gating it on engagement keeps the moment honest.
completion: |
  🎉 Xong! Bé Tiền và bạn chính thức đồng hành.

  Mỗi sáng 8h Bé Tiền sẽ gửi briefing ngắn về tài sản của bạn. Trong ngày, gõ <code>/menu</code> để xem tất cả tính năng, hoặc nhắn tự nhiên — Bé Tiền hiểu.
