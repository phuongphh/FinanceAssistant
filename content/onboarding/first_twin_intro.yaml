# First-Twin narrative (Phase 4.1, Story A.2).
# Mascot intro shown BEFORE the cone chart image so user has a frame
# for the chart they're about to see. Composer-only — no LLM call.

narrative: |
  ✨ Đây là <b>Twin tài chính</b> của bạn — Bé Tiền vẽ ra 3 con đường tương lai dựa trên tình hình hiện tại.

  • Đường <b>giữa</b> là điều kiện thường (kịch bản P50).
  • Đường <b>trên</b> là nếu bạn tiết kiệm chăm hơn (P90).
  • Đường <b>dưới</b> là nếu có biến cố (P10).

  Bạn không cần đoán tương lai — Bé Tiền đoán giúp, bạn chỉ cần quyết định.

# Demo variant — shown when user picks "Để Bé Tiền dùng demo trước".
# Must NOT call it "Twin của bạn" — that broke trust in user testing.
demo_narrative: |
  🎭 <b>Twin demo</b> — minh hoạ với <b>50 triệu</b> tiết kiệm giả định, không phải số liệu của bạn.

  • Đường <b>giữa</b> là điều kiện thường (kịch bản P50).
  • Đường <b>trên</b> là nếu chủ Twin tiết kiệm chăm hơn (P90).
  • Đường <b>dưới</b> là nếu có biến cố (P10).

  Nhập tài sản thật để Bé Tiền vẽ Twin riêng cho bạn.

caption: |
  📈 Twin của {name} — kịch bản {horizon} năm tới.

demo_caption: |
  📈 Twin demo — kịch bản {horizon} năm tới (50 triệu giả định).

# Demo ack — replaces the misleading "✅ Bé Tiền ghi nhận: 50tr"
# wording for the demo path so user doesn't think we banked their cash.
demo_ack: |
  🎭 Đang vẽ Twin demo với <b>50 triệu</b> giả định — chờ Bé Tiền vài giây nhé…

# In-moment feedback prompt — sent 5–10s after the chart image.
feedback_prompt:
  body: "💬 Bạn cảm thấy thế nào về Twin đầu tiên? Có câu hỏi về Twin? Cứ hỏi Bé Tiền nhé"
  buttons:
    love: "😍 Rất thích"
    confused: "🤔 Hơi khó hiểu"
    dislike: "😕 Chưa thích"
  callback_prefix: "onboarding_v2:fb:"
  ack: |
    Cảm ơn bạn — Bé Tiền ghi nhận để cải thiện 💚

# Fallback if Twin compute fails. Keep short — user already on edge.
# Tells the truth: there is NO background retry, the user has to tap.
compute_failed: |
  ⚠️ Bé Tiền chưa vẽ được Twin lần này. Bạn bấm <b>Thử lại</b> giúp Bé Tiền nhé.
compute_failed_retry_label: "🔄 Thử lại"
compute_failed_retry_callback: "onboarding_v2:retry_twin"

# Completion message after feedback (or auto after 30s).
completion: |
  🎉 Xong! Bé Tiền và bạn chính thức đồng hành.

  Mỗi sáng 8h Bé Tiền sẽ gửi briefing ngắn về tài sản của bạn. Trong ngày, gõ <code>/menu</code> để xem tất cả tính năng, hoặc nhắn tự nhiên — Bé Tiền hiểu.
