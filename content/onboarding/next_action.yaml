# Phase 4.2 Epic 2 — Next Best Action CTA matrix.
# 3 asset states × onboarding goals. Keep copy short and action-led.
#
# Phase 4.6 (Onboarding Reset) adds the first-life goal codes
# (emergency_fund / first_home / wedding) alongside the legacy asset-management
# codes. next_action_service falls back to the understand_wealth cell for any
# goal missing here, so these rows are additive — never required for safety,
# but they give the reset cohort copy that matches the goal they picked.

prefix: "💡 Bước tiếp theo dành cho bạn:"

buttons:
  add_asset:
    label: "🌱 Thêm tài sản"
    callback: "next_action:add_asset"
    action_type: "added_real_asset"
  add_income:
    label: "💰 Thêm thu nhập"
    callback: "next_action:add_income"
    action_type: "added_income"
  set_goal:
    label: "🎯 Đặt mục tiêu"
    callback: "next_action:set_goal"
    action_type: "set_goal"
  log_expense:
    label: "🧾 Ghi chi tiêu"
    callback: "next_action:log_expense"
    action_type: "logged_expense"

matrix:
  demo:
    understand_wealth:
      text: "Thêm tài sản thật để Twin trở thành của bạn."
      button: "add_asset"
    plan_goal:
      text: "Thêm tài sản thật để Bé Tiền lập kế hoạch chính xác."
      button: "add_asset"
    track_spending:
      text: "Thêm tài sản thật để xem chi tiêu match được không."
      button: "add_asset"
    emergency_fund:
      text: "Thêm số tiết kiệm thật để Bé Tiền biết bạn đang cách quỹ khẩn cấp bao xa."
      button: "add_asset"
    first_home:
      text: "Thêm tài sản thật để Bé Tiền vẽ đường tới căn nhà đầu tiên."
      button: "add_asset"
    wedding:
      text: "Thêm tài sản thật để Bé Tiền tính giúp bạn chuẩn bị đám cưới."
      button: "add_asset"
  real_no_income:
    understand_wealth:
      text: "Thêm 1 nguồn thu nhập để dự phóng chính xác hơn."
      button: "add_income"
    plan_goal:
      text: "Thêm thu nhập để Bé Tiền đề xuất mục tiêu khả thi."
      button: "add_income"
    track_spending:
      text: "Ghi 1 khoản chi tiêu hôm nay để bắt đầu theo dõi."
      button: "log_expense"
    emergency_fund:
      text: "Thêm thu nhập để Bé Tiền biết mỗi tháng bạn dành được bao nhiêu cho quỹ."
      button: "add_income"
    first_home:
      text: "Thêm thu nhập để Bé Tiền tính nhịp tiết kiệm mua nhà khả thi."
      button: "add_income"
    wedding:
      text: "Thêm thu nhập để Bé Tiền tính giúp bạn dành dụm cho đám cưới."
      button: "add_income"
  real_with_income:
    understand_wealth:
      text: "Đặt 1 mục tiêu lớn như mua nhà, nghỉ hưu, quỹ dự phòng."
      button: "set_goal"
    plan_goal:
      text: "Tạo mục tiêu đầu tiên — Bé Tiền sẽ track cùng bạn."
      button: "set_goal"
    track_spending:
      text: "Ghi 1 khoản chi tiêu để Bé Tiền học pattern của bạn."
      button: "log_expense"
    emergency_fund:
      text: "Đặt mục tiêu quỹ khẩn cấp — Bé Tiền sẽ track cùng bạn từng tháng."
      button: "set_goal"
    first_home:
      text: "Đặt mục tiêu mua nhà — Bé Tiền sẽ theo dõi tiến độ cùng bạn."
      button: "set_goal"
    wedding:
      text: "Đặt mục tiêu đám cưới — Bé Tiền sẽ track cùng bạn cho nhẹ đầu."
