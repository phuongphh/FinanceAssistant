# Phase 4.2 Epic 2 — Next Best Action CTA matrix.
# 3 asset states × 3 onboarding goals. Keep copy short and action-led.

prefix: "💡 Bước tiếp theo dành cho bạn:"
soft_prompt: "...hoặc hỏi Bé Tiền bất cứ điều gì về Twin"

buttons:
  add_asset:
    label: "🌱 Thêm tài sản"
    callback: "next_action:add_asset"
    action_type: "added_real_asset"
  add_income:
    label: "💰 Thêm thu nhập"
    callback: "next_action:add_income"
    action_type: "added_income"
  set_goal:
    label: "🎯 Đặt mục tiêu"
    callback: "next_action:set_goal"
    action_type: "set_goal"
  log_expense:
    label: "🧾 Ghi chi tiêu"
    callback: "next_action:log_expense"
    action_type: "logged_expense"

matrix:
  demo:
    understand_wealth:
      text: "Thêm tài sản thật để Twin trở thành của bạn."
      button: "add_asset"
    plan_goal:
      text: "Thêm tài sản thật để Bé Tiền lập kế hoạch chính xác."
      button: "add_asset"
    track_spending:
      text: "Thêm tài sản thật để xem chi tiêu match được không."
      button: "add_asset"
  real_no_income:
    understand_wealth:
      text: "Thêm 1 nguồn thu nhập để dự phóng chính xác hơn."
      button: "add_income"
    plan_goal:
      text: "Thêm thu nhập để Bé Tiền đề xuất mục tiêu khả thi."
      button: "add_income"
    track_spending:
      text: "Ghi 1 khoản chi tiêu hôm nay để bắt đầu theo dõi."
      button: "log_expense"
  real_with_income:
    understand_wealth:
      text: "Đặt 1 mục tiêu lớn như mua nhà, nghỉ hưu, quỹ dự phòng."
      button: "set_goal"
    plan_goal:
      text: "Tạo mục tiêu đầu tiên — Bé Tiền sẽ track cùng bạn."
      button: "set_goal"
    track_spending:
      text: "Ghi 1 khoản chi tiêu để Bé Tiền học pattern của bạn."
      button: "log_expense"
