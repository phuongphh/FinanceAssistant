# Profile screen copy — all user-facing Vietnamese strings.
#
# Loaded by backend/profile/handlers/profile_menu.py through the cached
# loader `_load_copy()`. File edits in production require a process
# restart (same convention as every other content/*.yaml).
#
# Conventions:
# - {placeholder} is a str.format() variable; never reorder placeholders
#   without updating the caller.
# - Ambiguous terms are explained on a dedicated glossary screen
#   (reached via the "❓ Giải thích các mục" button on the Profile
#   keyboard), not inline — inline hints crowded the dense mobile view.
# - Internal callback identifiers stay in Python (profile:edit_name,
#   profile:toggle:briefing, …). Only the visible text lives here.

# ============================================================
# PROFILE VIEW — main /menu → 👤 Profile screen
# ============================================================

profile_view:
  title: "👤 *Profile của {name}* {level_icon} *{level_name}*"
  level_description: "_{description}_"

  section_personal: "*Thông tin cá nhân*"
  field_display_name: "• Tên hiển thị: *{name}*"
  field_age_range: "• Nhóm tuổi: *{value}*"
  age_range_not_set: "Chưa chia sẻ"
  field_briefing: "• Báo cáo sáng: *{state}* lúc *{time}*"
  field_reminder: "• Nhắc định kỳ: *{state}* lúc *{time}*"
  state_on: "Bật"
  state_off: "Tắt"

  section_overview: "*Tổng quan*"
  field_account_age: "• Tuổi tài khoản: *{days} ngày*"
  field_net_worth: "• Tổng tài sản: *{value}*"
  wealth_journey_at_top: "• Hành trình tài sản: *đã đạt level cao nhất* 🏆"
  wealth_journey_in_progress: "• Hành trình tài sản: `{bar}` → *{next_level}* (còn {remaining})"
  field_net_worth_change: "• Thay đổi tài sản: *{sign}{pct}%*"

  section_activity: "*Hoạt động tự động ghi nhận*"
  field_asset_types: "• Loại tài sản: *{count}/6*"
  field_expense_this_month: "• Chi tiêu tháng này: *{count}*"
  field_expense_total: "• Tổng chi tiêu: *{count}*"
  field_goals: "• Mục tiêu: *{active} đang chạy* · *{completed} hoàn tất*"
  field_streak: "• Chuỗi hoạt động: *{days} ngày* 🔥"
  field_briefing_read: "• Báo cáo sáng đã đọc: *{count}*"

  footer: "_Profile này được tự động tổng hợp từ dữ liệu bạn đã dùng._"

# ============================================================
# GLOSSARY — opens when user taps "❓ Giải thích các mục"
# ============================================================
#
# Six entries covering every label in the Profile that a first-time
# user might not understand. Each entry: emoji + bold term + one
# paragraph (~30–50 words) explaining what the number means and how
# it's computed. Order mirrors the Profile screen for easy scanning.

glossary:
  title: "📖 *Giải thích các mục trong Profile*"
  intro: "_Bấm nút bên dưới để quay lại Profile khi đọc xong._"

  entries:
    - "🌅 *Báo cáo sáng*\nTin nhắn tóm tắt gửi tự động mỗi sáng theo giờ bạn đặt: tin chính trên thị trường, tổng tài sản hôm nay, và 1–2 gợi ý hành động phù hợp. Tắt/bật trong _Cài thông báo_."
    - "⏰ *Nhắc định kỳ*\nBé Tiền nhắc trước các khoản chi định kỳ sắp đến hạn — tiền nhà, internet, hoá đơn, gym… Bạn không phải nhớ ngày, không lo trễ hạn. Nhắc theo giờ bạn đặt trong _Cài thông báo_."
    - "🏆 *Hành trình tài sản*\nLevel dựa trên tổng tài sản: Khởi Đầu → Trẻ Năng Động → Trung Lưu Vững → Tinh Hoa → Đỉnh Cao. Mỗi level Bé Tiền tư vấn trọng tâm tài chính khác nhau (tiết kiệm cơ bản, đầu tư, bảo toàn, kế thừa)."
    - "📈 *Thay đổi tài sản*\nPhần trăm thay đổi của tổng tài sản hiện tại so với *ngày đầu tiên* bạn có dữ liệu trên Bé Tiền — không phải so với tháng trước. Nếu bạn vừa khai thêm tài sản lớn, % này sẽ rất cao và không phản ánh tăng trưởng đầu tư."
    - "💎 *Loại tài sản (X/6)*\nBé Tiền hỗ trợ 6 loại tài sản: tiền mặt & tài khoản, cổ phiếu, bất động sản, tiền số, vàng, khác. Số bên trái là số loại bạn đang theo dõi."
    - "🔥 *Chuỗi hoạt động*\nSố ngày liên tiếp bạn có hoạt động trên Bé Tiền — ghi chi tiêu, mở báo cáo sáng, gửi phản hồi… Bỏ một ngày là chuỗi reset về 0."

# ============================================================
# NOTICES — degraded / schema-missing fallback states
# ============================================================

notices:
  degraded: "_Mình đang hiển thị Profile ở chế độ an toàn; vài số liệu/cài đặt có thể tạm thời chưa cập nhật._"
  schema_missing: "_Profile chưa sẵn sàng vì DB thiếu bảng profile; admin chạy `alembic upgrade head` nhé._"

