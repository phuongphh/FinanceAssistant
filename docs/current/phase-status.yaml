# Phase status — single source of truth.
#
# This file is read by ``scripts/sync_phase_status.py`` to update the
# marked sections in CLAUDE.md, README.md, docs/README.md, and
# docs/current/strategy.md. Edit THIS file when phases change; the
# auto-sync workflow propagates to the rest.
#
# Workflow: ``.github/workflows/sync-phase-status.yml`` reruns the
# sync on every push that touches this file (or the consumer
# files / the script itself). When a new ``phase-*-detailed.md``
# is added without a matching roadmap entry, the sync script
# auto-inserts a skeleton entry (status=planned, skeleton=true)
# that the dev must manually fill in before re-pushing — the
# ``--check`` mode fails CI while ``skeleton: true`` is present.
#
# Schema:
#   current_phase     — id of the phase the team is actively working on
#   phases[]          — every phase the team plans to ship, in order
#     id              — short tag, used in section headings (e.g. "3.5")
#     name            — human title (Vietnamese OK)
#     status          — done | current | testing | next | planned
#     duration        — informational ("3 tuần", "4 tuần", "TBD")
#     detail_doc      — path (relative to repo root); empty if not yet drafted
#     issues_doc      — path; empty if no GitHub-ready issue list
#     description     — 1-line summary that goes into roadmap tables
#     completed_date  — ISO date OR empty; populated when status flips to "done"
#     icon            — emoji shown next to the name in tables
#     skeleton        — OPTIONAL bool. Auto-set true by sync script when it
#                       inserts a placeholder for a phase-*-detailed.md
#                       that has no entry yet. Dev must hand-fill the real
#                       fields and remove this key. CI --check fails while
#                       any entry has skeleton: true.
#
# Adding a new phase:
#   1. Append an entry under phases (or let sync auto-insert a skeleton
#      placeholder, then hand-fill the real fields).
#   2. If you flip current_phase, set the previous phase's status to "done".
#   3. Commit. The workflow updates all marker sections.

