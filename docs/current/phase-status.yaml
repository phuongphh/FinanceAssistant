# Phase status — single source of truth.
#
# This file is read by ``scripts/sync_phase_status.py`` to update the
# marked sections in CLAUDE.md, README.md, docs/README.md, and
# docs/current/strategy.md. Edit THIS file when phases change; the
# auto-sync workflow propagates to the rest.
#
# Workflow: ``.github/workflows/sync-phase-status.yml`` reruns the
# sync on every push that touches this file or adds a new
# ``phase-*-detailed.md`` document.
#
# Schema:
#   current_phase     — id of the phase the team is actively working on
#   roadmap[]         — every phase the team plans to ship, in order
#     id              — short tag, used in section headings (e.g. "3.5")
#     name            — human title (Vietnamese OK)
#     status          — done | current | next | planned
#     duration        — informational ("3 tuần", "4 tuần", "TBD")
#     detailed_doc    — path (relative to repo root); empty if not yet drafted
#     issues_doc      — path; empty if no GitHub-ready issue list
#     description     — 1-line summary that goes into roadmap tables
#     completed_date  — ISO date OR empty; populated when status flips to "done"
#     icon            — emoji shown next to the name in tables
#
# Adding a new phase:
#   1. Append an entry under roadmap.
#   2. If you flip current_phase, set the previous phase's status to "done".
#   3. Commit. The workflow updates all marker sections.

