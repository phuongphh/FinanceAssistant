<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard</title>
    <!-- BUILD_BOOTSTRAP -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <link rel="stylesheet" href="/miniapp/static/css/style.css">
</head>
<body>
    <main id="app">
        <section id="loading" class="loading" aria-live="polite">
            <div class="spinner"></div>
            <p>Đang tải dashboard…</p>
        </section>

        <section id="error" class="error" hidden>
            <p id="error-message">Không tải được dữ liệu.</p>
            <button id="retry-btn" type="button">Thử lại</button>
        </section>

        <section id="content" hidden>
            <header class="card card-primary">
                <div class="card-label">Chi tiêu tháng này</div>
                <div class="card-amount" id="total-spent">—</div>
                <div class="card-meta">
                    <span id="transaction-count">0</span> giao dịch ·
                    <span id="month-label">—</span>
                </div>
            </header>

            <section class="section">
                <h2>Theo danh mục</h2>
                <div class="chart-container">
                    <canvas id="category-chart" role="img" aria-label="Biểu đồ danh mục chi tiêu"></canvas>
                </div>
                <div id="category-list"></div>
            </section>

            <section class="section">
                <h2>Xu hướng 30 ngày</h2>
                <div class="chart-container">
                    <canvas id="trend-chart" role="img" aria-label="Biểu đồ chi tiêu theo ngày"></canvas>
                </div>
            </section>

            <section class="section expense-manager" aria-label="Quản lý chi tiêu">
                <div class="section-heading-row">
                    <h2>Giao dịch tháng này</h2>
                    <button id="add-expense-btn" class="small-primary-btn" type="button">+ Thêm</button>
                </div>
                <label class="filter-label" for="expense-month">Lọc theo tháng</label>
                <input id="expense-month" class="month-input" type="month" />
                <div id="expense-list" class="expense-list"></div>
                <p id="expense-empty" class="empty-state" hidden>Chưa có chi tiêu trong tháng này.</p>
            </section>

            <!-- APP_VERSION_MARKER -->
        </section>
    </main>

    <div id="expense-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="expense-modal-title">
        <div class="modal-content">
            <h3 id="expense-modal-title">Thêm chi tiêu</h3>
            <label for="expense-amount">Số tiền (VNĐ)</label>
            <input id="expense-amount" type="number" min="1000" step="1000" inputmode="numeric" />
            <label for="expense-category">Danh mục</label>
            <select id="expense-category"></select>
            <label for="expense-date">Ngày</label>
            <input id="expense-date" type="date" />
            <label for="expense-note">Ghi chú / cửa hàng</label>
            <input id="expense-note" type="text" maxlength="200" placeholder="VD: ăn trưa, Grab…" />
            <label for="expense-payment">Phương thức thanh toán</label>
            <input id="expense-payment" type="text" maxlength="64" placeholder="Tiền mặt, thẻ, chuyển khoản…" />
            <div class="modal-actions">
                <button id="expense-delete" type="button" class="danger-btn" hidden>Xoá</button>
                <button id="expense-cancel" type="button" class="secondary-btn">Quay về</button>
                <button id="expense-save" type="button" class="primary-btn">Lưu</button>
            </div>
        </div>
    </div>

    <script src="/miniapp/static/js/dashboard_common.js" defer></script>
    <script src="/miniapp/static/js/dashboard.js" defer></script>
</body>
</html>
