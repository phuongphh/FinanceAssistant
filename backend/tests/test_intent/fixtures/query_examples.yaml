# Query fixtures for the Phase 3.5 intent classifier.
#
# Schema (per entry):
#   text:                       raw user message exactly as typed
#   expected_intent:            an IntentType.value from backend/intent/intents.py
#   expected_parameters:        OPTIONAL dict — only keys that MUST appear; extras allowed
#   expected_min_confidence:    OPTIONAL float, default 0.85 for canonical, 0.5 for edge cases
#   notes:                      free-form annotation for humans
#
# Adding new fixtures:
#   - keep the comment block above each block describing WHY this case matters
#   - prefer real queries pasted from telegram chats over synthetic ones
#   - if it tests a regression, add the issue # in notes
#
# Loaded via ``backend.tests.test_intent.fixtures.load_query_fixtures``.

canonical:
  # The 11 design-phase queries — these are the primary contract for
  # rule-based coverage. Confidence ≥0.85 is the bar (issue #117).

  - text: "tiết kiệm 1tr"
    expected_intent: action_record_saving
    expected_parameters:
      amount: 1000000
    notes: "Saving action with amount shorthand."

  - text: "tài sản của tôi có gì?"
    expected_intent: query_assets
    notes: "Direct asset list query."

  - text: "tôi có tài sản gì?"
    expected_intent: query_assets
    notes: "Same query, different word order."

  - text: "làm thế nào để đầu tư tiếp?"
    expected_intent: advisory
    notes: "Open-ended advisory — needs LLM in real flow but rule should still tag advisory."

  - text: "hiện tại có thể mua gì để có thêm tài sản?"
    expected_intent: advisory
    notes: "Buying suggestion — advisory class."

  - text: "mục tiêu hiện giờ của tôi có gì?"
    expected_intent: query_goals
    notes: "Goal listing query."

  - text: "muốn đạt được việc mua xe tôi cần phải làm gì?"
    expected_intent: query_goal_progress
    expected_parameters:
      goal_name: "mua xe"
    notes: "Specific-goal progress query."

  - text: "portfolios chứng khoán của tôi gồm những mã gì?"
    expected_intent: query_portfolio
    notes: "Stock portfolio listing."

  - text: "các chi tiêu cho sức khỏe của tôi trong tháng này gồm những gì?"
    expected_intent: query_expenses_by_category
    expected_parameters:
      category: "health"
      time_range: "this_month"
    notes: "Expense-by-category with time range."

  - text: "liệt kê cho tôi mọi chi phí về ăn uống của tôi tháng này?"
    expected_intent: query_expenses_by_category
    expected_parameters:
      category: "food"
      time_range: "this_month"
    notes: "List intent + category + time range."

  - text: "thu nhập của tôi là như thế nào?"
    expected_intent: query_income
    notes: "Income listing."

  # Additional canonical for the remaining intent types so coverage
  # is complete (issue #117 requires patterns for query_net_worth,
  # query_market, query_cashflow as well).
  - text: "tổng tài sản của tôi là bao nhiêu?"
    expected_intent: query_net_worth
    notes: "Direct net-worth question."

  - text: "VNM giá bao nhiêu?"
    expected_intent: query_market
    expected_parameters:
      ticker: "VNM"
    notes: "Stock price query with explicit ticker."

  - text: "VN-Index hôm nay"
    expected_intent: query_market
    expected_parameters:
      ticker: "VNINDEX"
    notes: "Index price query."

  # Regression: free-text "giá vàng" used to fall through the ticker
  # whitelist (vang ∉ ALL_TICKERS), drop to the LLM, and surface
  # "Bạn muốn xem giá mã nào?" instead of the gold-prices handler.
  # Should now classify as query_market with category=gold so the
  # handler routes to _handle_gold_prices().
  - text: "giá vàng"
    expected_intent: query_market
    expected_parameters:
      category: "gold"
    notes: "Gold-category market query (no specific ticker)."

  - text: "vàng hôm nay bao nhiêu"
    expected_intent: query_market
    expected_parameters:
      category: "gold"
    notes: "Gold-category alternative phrasing."

  # Regression for #658: "Giá vàng hôm nay" used to return
  # "Mình chưa biết câu trả lời này". Now must route to query_market
  # with category=gold so the handler returns today's gold prices.
  - text: "Giá vàng hôm nay"
    expected_intent: query_market
    expected_parameters:
      category: "gold"
    notes: "Gold-category query with explicit hôm nay (issue #658)."

  - text: "giá crypto"
    expected_intent: query_market
    expected_parameters:
      category: "crypto"
    notes: "Crypto-category market query (no specific coin)."

  - text: "giá tiền số"
    expected_intent: query_market
    expected_parameters:
      category: "crypto"
    notes: "Vietnamese 'tiền số' = crypto category."

  - text: "tháng này tôi tiết kiệm được bao nhiêu?"
    expected_intent: query_cashflow
    notes: "Net cashflow / saving for the month."
  - text: "tổng hợp giao dịch tháng trước"
    expected_intent: query_expenses
    expected_parameters:
      time_range: "last_month"
    notes: "Regression: read-only transaction summary must not fall to LLM/unclear."

  - text: "báo cáo giao dịch hôm qua"
    expected_intent: query_expenses
    expected_parameters:
      time_range: "yesterday"
    notes: "Regression: report + giao dịch means transaction listing, not monthly CFO report."

  - text: "báo cáo tài sản tháng này"
    expected_intent: query_assets
    expected_parameters:
      time_range: "this_month"
    notes: "Asset report by time range should stay in query_assets (regression #757)."

  - text: "xem báo cáo đất tuần này"
    expected_intent: query_assets
    expected_parameters:
      asset_type: "real_estate"
      asset_subtype: "land"
      time_range: "this_week"
    notes: "Sub-asset (land) + time range should be captured for report asks (#757)."

  - text: "show fund report tháng trước"
    expected_intent: query_assets
    expected_parameters:
      asset_type: "stock"
      asset_subtype: "fund"
      time_range: "last_month"
    notes: "Fund sub-asset report with English verb still maps correctly (#757)."

  - text: "báo cáo mục tiêu tuần này"
    expected_intent: query_goals
    expected_parameters:
      time_range: "this_week"
    notes: "Goals report by time range should map to query_goals (#757)."


edge_cases:
  # Edge cases — diacritics, typos, English, gibberish, OOS, greetings, etc.
  # Confidence threshold relaxed; the goal is to NOT silent-fail.

  - text: "tai san cua toi"
    expected_intent: query_assets
    expected_min_confidence: 0.6
    notes: "No diacritics. Pattern should still match."

  - text: "tai san co gi"
    expected_intent: query_assets
    expected_min_confidence: 0.6
    notes: "No diacritics, short form."

  - text: "tài sảnn của tôii"
    expected_intent: query_assets
    expected_min_confidence: 0.5
    notes: "Typos with double letters — should still match for query_assets."

  - text: "show my assets"
    expected_intent: query_assets
    expected_min_confidence: 0.6
    notes: "English query."

  - text: "asdkfjh"
    expected_intent: unclear
    expected_min_confidence: 0.0
    notes: "Gibberish must classify as unclear, not pretend match."

  - text: "?"
    expected_intent: unclear
    expected_min_confidence: 0.0
    notes: "Single-char punctuation — unclear."

  - text: "thời tiết hôm nay thế nào"
    expected_intent: out_of_scope
    expected_min_confidence: 0.0
    notes: "Weather — out of scope for a finance bot."

  - text: "hôm nay có news gì về Apple"
    expected_intent: out_of_scope
    expected_min_confidence: 0.0
    notes: "US stock news — outside Phase 3.5 scope."

  - text: "chào"
    expected_intent: greeting
    notes: "Greeting only."

  - text: "xin chào Bé Tiền"
    expected_intent: greeting
    notes: "Polite greeting."

  - text: "hi"
    expected_intent: greeting
    notes: "English greeting."

  - text: "/help"
    expected_intent: help
    expected_min_confidence: 1.0
    notes: "Slash help command."

  - text: "giúp tôi với"
    expected_intent: help
    notes: "Vietnamese help request."

  - text: "không biết làm sao bắt đầu"
    expected_intent: help
    expected_min_confidence: 0.6
    notes: "User is lost — counts as help."

  - text: "BTC giá hôm nay"
    expected_intent: query_market
    expected_parameters:
      ticker: "BTC"
    notes: "Crypto price query."

  - text: "bitcoin giá bao nhiêu"
    expected_intent: query_market
    expected_parameters:
      ticker: "BTC"
    notes: "Vietnamese form 'bitcoin' should map to BTC ticker."

  - text: "chi tiêu tháng trước"
    expected_intent: query_expenses
    expected_parameters:
      time_range: "last_month"
    notes: "General expense query for previous month."

  - text: "lương của mình tháng này"
    expected_intent: query_income
    notes: "Salary alias for income."

  - text: "danh mục đầu tư"
    expected_intent: query_portfolio
    notes: "Portfolio short form."

  - text: "nên đầu tư cổ phiếu nào"
    expected_intent: advisory
    notes: "Stock-pick advisory."

  # ----- NLU Bugs Epic #652 regression fixtures -----

  - text: "thêm bất động sản"
    expected_intent: action_add_asset
    expected_parameters:
      asset_type: "real_estate"
    notes: "Add-asset wizard, real estate (#654)."

  - text: "thêm cổ phiếu"
    expected_intent: action_add_asset
    expected_parameters:
      asset_type: "stock"
    notes: "Add-asset wizard, stock (#654)."

  - text: "thêm crypto"
    expected_intent: action_add_asset
    expected_parameters:
      asset_type: "crypto"
    notes: "Add-asset wizard, crypto (#654)."

  - text: "sửa cổ phiếu FPT thành 200 cổ"
    expected_intent: action_edit_asset
    expected_parameters:
      asset_type: "stock"
    notes: "Edit-asset wizard, stock volume (#660)."

  - text: "sửa đất ba tư"
    expected_intent: action_edit_asset
    expected_parameters:
      asset_type: "real_estate"
    notes: "Edit-asset by subtype + name (#653)."

  - text: "sửa bất động sản"
    expected_intent: action_edit_asset
    expected_parameters:
      asset_type: "real_estate"
    notes: "Edit-asset wizard, real estate (#653)."

  - text: "thêm mục tiêu"
    expected_intent: action_add_goal
    notes: "Add-goal wizard (#659)."

  - text: "tạo mục tiêu mới"
    expected_intent: action_add_goal
    notes: "Add-goal wizard alt form (#659)."

  - text: "chi tiêu dashboard"
    expected_intent: nav_expense_dashboard
    notes: "Expense dashboard miniapp link (#655)."

  - text: "dashboard chi tiêu"
    expected_intent: nav_expense_dashboard
    notes: "Expense dashboard, inverted word order (#655)."

  # Delete-asset intent — added after the chat screenshot showed
  # "xoá tài sản ACB" / "xoá tài sản ví zalopay" falling through to
  # UNCLEAR because no rule pattern covered the delete shape.
  - text: "xoá tài sản"
    expected_intent: action_delete_asset
    notes: "Delete wizard — generic form."

  - text: "xoá tài sản ACB"
    expected_intent: action_delete_asset
    expected_parameters:
      asset_name: "acb"
    notes: "Delete by exact name — handler should jump to confirm card."

  - text: "xoá ví zalopay"
    expected_intent: action_delete_asset
    expected_parameters:
      asset_type: "cash"
      asset_name: "zalopay"
    notes: "Delete a cash wallet by its label."

  - text: "xoá cổ phiếu FPT"
    expected_intent: action_delete_asset
    expected_parameters:
      asset_type: "stock"
      asset_name: "fpt"
    notes: "Delete stock holding by ticker."

  # Income-to-wallet — anchored shapes that previously hit the LLM
  # tier (or worse, fell through entirely) when the user expected the
  # quick-transaction card.
  - text: "thêm 3tr vào ví momo"
    expected_intent: action_quick_transaction
    expected_min_confidence: 0.8
    notes: "Add income to a named wallet — rule tier saves an LLM call."

  - text: "nhận lương 20tr vào tiền mặt"
    expected_intent: action_quick_transaction
    expected_min_confidence: 0.8
    notes: "Salary income credited to a cash account (#656)."

  # Inline-edit shapes — these used to fall through the picker even
  # though the user had already named both the asset and the new
  # value. The handler now reads asset_name + new_value and applies
  # the update inline.
  - text: "sửa cổ phiếu FPT thành 200 cổ"
    expected_intent: action_edit_asset
    expected_parameters:
      asset_type: "stock"
      asset_name: "fpt"
      new_value: "200 cổ"
    notes: "Inline stock-quantity edit (#659)."

  - text: "sửa ACB thành 50tr"
    expected_intent: action_edit_asset
    expected_parameters:
      asset_name: "acb"
      new_value: "50tr"
    notes: "Inline cash-balance edit by name."

  - text: "cập nhật vàng SJC thành 5 chỉ"
    expected_intent: action_edit_asset
    expected_parameters:
      asset_type: "gold"
      asset_name: "sjc"
      new_value: "5 chỉ"
    notes: "Inline gold-quantity edit."

  - text: "sửa BĐS nhà số 1 thành 3 tỷ 2"
    expected_intent: action_edit_asset
    expected_parameters:
      asset_type: "real_estate"
      new_value: "3 tỷ 2"
    notes: "Inline real-estate revaluation with VN decimal shortcut."

  - text: "dashboard"
    expected_intent: nav_expense_dashboard
    expected_min_confidence: 0.9
    notes: "Bare 'dashboard' should open the miniapp, not produce a report."
