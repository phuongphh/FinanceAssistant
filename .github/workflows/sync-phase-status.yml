name: Sync Phase Status

# Auto-propagate ``docs/current/phase-status.yaml`` into the marker
# sections of CLAUDE.md, README.md, docs/README.md, and
# docs/current/strategy.md.
#
# When it runs:
#   - any push to main that touches the YAML, the script, or the
#     consumer files (so a hand-edit to a marked region is corrected
#     on the next push)
#   - manual dispatch (``workflow_dispatch``) so we can re-render on
#     demand without making a code change
#
# Auth: uses the default GITHUB_TOKEN to push back to main when the
# script's output differs from what's already there. Skips committing
# when there's no diff (idempotent run).

on:
  push:
    branches:
      - main
    paths:
      - "docs/current/phase-status.yaml"
      - "docs/current/phase-*-detailed.md"
      - "docs/current/phase-*-issues.md"
      - "docs/current/test-cases/**"
      - "scripts/sync_phase_status.py"
      - "scripts/archive_phase.py"
      - "README.md"
      - "CLAUDE.md"
      - "docs/README.md"
      - "docs/current/strategy.md"
      - ".github/workflows/sync-phase-status.yml"
  workflow_dispatch:

permissions:
  contents: write

# Single concurrency group so two pushes in quick succession serialise
# rather than racing on the same commit.
concurrency:
  group: sync-phase-status
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access for the auto-commit step below; the
          # default GITHUB_TOKEN is enough for pushes to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Archive signed-off phases
        # Move phase-{id}-* docs (except detailed_doc) to docs/archive/
        # whenever the corresponding test-cases marker has been
        # flipped to ``signed``. Idempotent — no-op if nothing to do.
        run: python scripts/archive_phase.py

      - name: Run sync
        # Auto-insert YAML skeleton entries for any new
        # phase-*-detailed.md, then propagate phase-status.yaml into
        # the marker sections of CLAUDE.md / README.md / etc.
        run: python scripts/sync_phase_status.py

      - name: Auto-commit if changed
        # Idempotency guard: only commit when ``git diff`` (incl.
        # staged ``git mv``s from the archive step) shows real bytes
        # changed. ``--quiet --exit-code`` returns non-zero on diff;
        # we invert that so the commit step runs only on diff.
        # ``git status --porcelain`` catches renames/adds that plain
        # ``git diff`` misses.
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — sync + archive produced no diff, skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/ README.md CLAUDE.md
          git commit -m "chore(docs): sync phase status + archive signed-off phases

          Auto-generated by .github/workflows/sync-phase-status.yml
          Source of truth: docs/current/phase-status.yaml + test-cases markers"
          git push
