name: Move Issue to Done on PR Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  move-to-done:
    # Chỉ chạy khi PR được merge (không phải close thường)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # BƯỚC 1: Trích xuất TẤT CẢ issue numbers từ PR body và branch name
      # Hỗ trợ:
      #   - Body: "Closes #26", "Fixes #26, #27", "Resolves #26 and #27"
      #   - Branch: "claude/issue-26-...", "claude/implement-issues-26-27-..."
      # -------------------------------------------------------
      - name: Extract linked issue numbers
        id: extract
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const branch = context.payload.pull_request.head.ref || '';

            const issueNumbers = new Set();

            // Body: tìm "closes/fixes/resolves" rồi gom tất cả #N theo sau
            // (cho phép cách nhau bởi dấu phẩy, "and", "&", khoảng trắng)
            const closeRegex = /(?:closes|fixes|resolves)\b[\s:]*((?:#\d+(?:\s*(?:,|and|&)\s*#?\d+)*))/gi;
            let m;
            while ((m = closeRegex.exec(body)) !== null) {
              const nums = m[1].match(/\d+/g) || [];
              nums.forEach(n => issueNumbers.add(parseInt(n, 10)));
            }

            // Branch: bắt cả `issue-N` (số ít) và `issues-N-N-...` (số nhiều)
            const branchRegex = /issues?[-_](\d+(?:[-_]\d+)*)/i;
            const bm = branch.match(branchRegex);
            if (bm) {
              (bm[1].match(/\d+/g) || []).forEach(n => issueNumbers.add(parseInt(n, 10)));
            }

            const list = [...issueNumbers].sort((a, b) => a - b);
            core.setOutput('issue_numbers', list.join(','));

            if (list.length > 0) {
              console.log(`Found issues [${list.join(', ')}] linked to PR #${context.payload.pull_request.number}`);
            } else {
              console.log('No linked issue found — skipping');
            }

      # -------------------------------------------------------
      # BƯỚC 2: Move TẤT CẢ issue đã link sang Done trên Project board
      #         + đóng issue trên GitHub nếu chưa đóng (branch-only refs
      #         không tự đóng issue như "Closes #N" làm)
      # -------------------------------------------------------
      - name: Move issues to Done and close
        if: steps.extract.outputs.issue_numbers != ''
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const issueNumbers = '${{ steps.extract.outputs.issue_numbers }}'
              .split(',')
              .map(n => parseInt(n, 10))
              .filter(n => !Number.isNaN(n));

            const projectNumber = 4;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Lấy Project ID + field Status (chỉ query 1 lần)
            const projectQuery = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, number: projectNumber });

            const project = projectQuery.user.projectV2;
            const projectId = project.id;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            const doneOption = statusField?.options?.find(o => o.name === 'Done');

            if (!statusField || !doneOption) {
              core.warning('Could not find Status field or Done option on project board');
              return;
            }

            for (const issueNumber of issueNumbers) {
              try {
                // 1) Move trên project board
                const issueQuery = await github.graphql(`
                  query($owner: String!, $repo: String!, $issue: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $issue) {
                        state
                        projectItems(first: 10) {
                          nodes {
                            id
                            project { id }
                          }
                        }
                      }
                    }
                  }
                `, { owner, repo, issue: issueNumber });

                const issue = issueQuery.repository.issue;
                if (!issue) {
                  core.warning(`Issue #${issueNumber} not found — skipping`);
                  continue;
                }

                const projectItem = issue.projectItems.nodes
                  .find(item => item.project.id === projectId);

                if (projectItem) {
                  await github.graphql(`
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }) {
                        projectV2Item { id }
                      }
                    }
                  `, {
                    projectId,
                    itemId: projectItem.id,
                    fieldId: statusField.id,
                    optionId: doneOption.id
                  });
                  console.log(`✅ Issue #${issueNumber} moved to Done`);
                } else {
                  core.warning(`Issue #${issueNumber} not on project #${projectNumber} — skipping board move`);
                }

                // 2) Close issue nếu vẫn OPEN (GitHub chỉ tự đóng khi body có
                //    "Closes #N"; với branch-only references thì phải đóng tay)
                if (issue.state === 'OPEN') {
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  console.log(`✅ Issue #${issueNumber} closed`);
                }
              } catch (err) {
                core.warning(`Failed to process issue #${issueNumber}: ${err.message}`);
              }
            }
