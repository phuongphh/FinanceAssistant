name: Move Issue to Done

# Trigger:
#   - PR merged → đóng + move các issue trong "Closes #N" body / branch
#   - Issue closed (completed) → move chính issue đó (+ sub-issues) sang Done
#
# Cùng 1 file vì step BƯỚC 2 (move-to-Done logic) là chia sẻ.
on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  move-to-done:
    # Chạy khi:
    #   - PR merged (không phải close thường), HOẶC
    #   - Issue được close với reason "completed" (loại "not_planned" để không
    #     move trash issues sang Done)
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'issues' && github.event.issue.state_reason == 'completed')
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # BƯỚC 1: Trích xuất danh sách issue cần xử lý
      #
      # PR-merge case: parse body + branch (giữ logic cũ)
      # Issue-close case: chỉ chính issue đó (sub-issues sẽ expand ở BƯỚC 2)
      # -------------------------------------------------------
      - name: Extract linked issue numbers
        id: extract
        uses: actions/github-script@v6
        with:
          script: |
            const issueNumbers = new Set();

            if (context.eventName === 'issues') {
              // Issue-close case: chỉ chính issue đó
              issueNumbers.add(context.payload.issue.number);
            } else {
              // PR-merge case: parse body + branch
              const body = context.payload.pull_request.body || '';
              const branch = context.payload.pull_request.head.ref || '';

              // Body: tìm "closes/fixes/resolves" rồi gom tất cả #N theo sau
              // (cho phép cách nhau bởi dấu phẩy, "and", "&", khoảng trắng)
              const closeRegex = /(?:closes|fixes|resolves)\b[\s:]*((?:#\d+(?:\s*(?:,|and|&)\s*#?\d+)*))/gi;
              let m;
              while ((m = closeRegex.exec(body)) !== null) {
                const nums = m[1].match(/\d+/g) || [];
                nums.forEach(n => issueNumbers.add(parseInt(n, 10)));
              }

              // Branch: bắt cả `issue-N` (số ít) và `issues-N-N-...` (số nhiều)
              const branchRegex = /issues?[-_](\d+(?:[-_]\d+)*)/i;
              const bm = branch.match(branchRegex);
              if (bm) {
                (bm[1].match(/\d+/g) || []).forEach(n => issueNumbers.add(parseInt(n, 10)));
              }
            }

            const list = [...issueNumbers].sort((a, b) => a - b);
            core.setOutput('issue_numbers', list.join(','));

            if (list.length > 0) {
              console.log(`Found issues [${list.join(', ')}] (event: ${context.eventName})`);
            } else {
              console.log('No linked issue found — skipping');
            }

      # -------------------------------------------------------
      # BƯỚC 2: Move TẤT CẢ issue đã link sang Done trên Project board
      #         + đóng issue trên GitHub nếu chưa đóng (branch-only refs
      #         không tự đóng issue như "Closes #N" làm)
      #
      # Nếu issue có sub-issues (GitHub native hierarchy), expand thêm
      # tất cả children. Mirror logic của auto-pr.yml — bảo đảm khi PR
      # tạo thủ công với chỉ `Closes #parent`, sub-issues vẫn được xử lý.
      #
      # FALLBACK: Nếu Epic không có native sub-issues (legacy convention
      # — checkbox list `- [ ] #N` trong body), parse body để lấy
      # children. Ngăn lặp lại bug "Epic được đóng mà children stay open"
      # khi convention #2 ở CLAUDE.md § 0.2 không được follow.
      # -------------------------------------------------------
      - name: Move issues to Done and close
        if: steps.extract.outputs.issue_numbers != ''
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const initial = '${{ steps.extract.outputs.issue_numbers }}'
              .split(',')
              .map(n => parseInt(n, 10))
              .filter(n => !Number.isNaN(n));

            const projectNumber = 4;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Helper: parse "- [ ] #N" / "- [x] #N" checkbox refs from
            // an Epic body. Used as fallback when native subIssues is
            // empty. Anchored to a list-item line so prose mentions
            // like "see #50 for context" don't get pulled in.
            const parseChecklistChildren = (body) => {
              if (!body) return [];
              const out = new Set();
              const re = /^[-*]\s+\[[ xX]\]\s+#(\d+)\b/gm;
              let m;
              while ((m = re.exec(body)) !== null) {
                out.add(parseInt(m[1], 10));
              }
              return [...out];
            };

            // BFS expand parent → sub-issues (cùng logic với auto-pr.yml)
            const expanded = new Set(initial);
            const visited = new Set();
            let frontier = [...initial];

            while (frontier.length > 0) {
              const next = [];
              for (const n of frontier) {
                if (visited.has(n)) continue;
                visited.add(n);
                let foundChildren = [];
                try {
                  const result = await github.graphql(`
                    query($owner: String!, $repo: String!, $issue: Int!) {
                      repository(owner: $owner, name: $repo) {
                        issue(number: $issue) {
                          body
                          subIssues(first: 100) {
                            nodes { number }
                          }
                        }
                      }
                    }
                  `, { owner, repo, issue: n });
                  const issueData = result.repository?.issue;
                  const subs = issueData?.subIssues?.nodes || [];
                  if (subs.length > 0) {
                    foundChildren = subs.map(s => s.number);
                    console.log(`Issue #${n} has ${subs.length} native sub-issue(s): [${foundChildren.map(x => '#' + x).join(', ')}]`);
                  } else {
                    // Fallback: parse checkbox list from body.
                    const fallback = parseChecklistChildren(issueData?.body || '');
                    if (fallback.length > 0) {
                      foundChildren = fallback;
                      console.log(`Issue #${n} has no native sub-issues; fell back to checklist: [${fallback.map(x => '#' + x).join(', ')}]`);
                    }
                  }
                  for (const sub of foundChildren) {
                    if (!expanded.has(sub)) {
                      expanded.add(sub);
                      next.push(sub);
                    }
                  }
                } catch (err) {
                  core.warning(`Could not query sub-issues for #${n}: ${err.message}`);
                }
              }
              frontier = next;
            }

            const issueNumbers = [...expanded].sort((a, b) => a - b);
            console.log(`Processing ${issueNumbers.length} issue(s) (initial: ${initial.length}, expanded: ${issueNumbers.length - initial.length})`);

            // Lấy Project ID + field Status (chỉ query 1 lần)
            const projectQuery = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, number: projectNumber });

            const project = projectQuery.user.projectV2;
            const projectId = project.id;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            const doneOption = statusField?.options?.find(o => o.name === 'Done');

            if (!statusField || !doneOption) {
              core.warning('Could not find Status field or Done option on project board');
              return;
            }

            for (const issueNumber of issueNumbers) {
              try {
                // 1) Move trên project board
                const issueQuery = await github.graphql(`
                  query($owner: String!, $repo: String!, $issue: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $issue) {
                        state
                        projectItems(first: 10) {
                          nodes {
                            id
                            project { id }
                          }
                        }
                      }
                    }
                  }
                `, { owner, repo, issue: issueNumber });

                const issue = issueQuery.repository.issue;
                if (!issue) {
                  core.warning(`Issue #${issueNumber} not found — skipping`);
                  continue;
                }

                const projectItem = issue.projectItems.nodes
                  .find(item => item.project.id === projectId);

                if (projectItem) {
                  await github.graphql(`
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }) {
                        projectV2Item { id }
                      }
                    }
                  `, {
                    projectId,
                    itemId: projectItem.id,
                    fieldId: statusField.id,
                    optionId: doneOption.id
                  });
                  console.log(`✅ Issue #${issueNumber} moved to Done`);
                } else {
                  core.warning(`Issue #${issueNumber} not on project #${projectNumber} — skipping board move`);
                }

                // 2) Close issue nếu vẫn OPEN (GitHub chỉ tự đóng khi body có
                //    "Closes #N"; với branch-only references thì phải đóng tay)
                if (issue.state === 'OPEN') {
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  console.log(`✅ Issue #${issueNumber} closed`);
                }
              } catch (err) {
                core.warning(`Failed to process issue #${issueNumber}: ${err.message}`);
              }
            }
