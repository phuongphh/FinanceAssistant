name: Auto Create PR

on:
  push:
    branches:
      - "claude/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------------
      # BƯỚC 1: Lấy TẤT CẢ issue numbers từ branch và commits
      #
      # 3 nguồn (priority cao → thấp):
      #   - Branch name : `issue-N`, `issues-N-N-...`, `issues_N`
      #   - Commits     : keyword close-style — "Closes #N", "Fixes #N",
      #                   "Resolves #N", "Issue #N" (case-insensitive)
      #   - Commits     : bare `#N` reference (word-boundary để né `#FFAA00`,
      #                   `cache#abc`, v.v.)
      #
      # Output: comma-separated list (e.g. "59,60,61"). Một issue/multi-
      # issue PR đều dùng cùng format. Empty string nếu không tìm thấy.
      # -------------------------------------------------------
      - name: Extract issue numbers from branch + commits
        id: extract
        run: |
          BRANCH="${{ github.ref_name }}"
          git fetch origin main --depth=50 2>/dev/null || true

          # Dump commit messages 1 lần, các grep đọc lại từ file để tránh
          # subshell quirks và để dễ debug nếu có gì sai.
          COMMITS_FILE=$(mktemp)
          git log origin/main..HEAD --format='%s%n%b' > "$COMMITS_FILE"

          CANDIDATES=$(mktemp)

          # Nguồn 1: branch name
          # Bắt cả `issue-26` và `issues-26-27-28` (multi-issue branch)
          echo "$BRANCH" \
            | grep -oP '(?:^|[^A-Za-z0-9_])issues?[-_]\K\d+(?:[-_]\d+)*' \
            | tr '_-' '\n' \
            | grep -oP '\d+' \
            >> "$CANDIDATES" || true

          # Nguồn 2: commit messages — explicit close keywords
          # ("Closes #N", "Fixes #N", "Resolves #N", "Issue #N", v.v.)
          grep -oiP '(?:issue|closes?|fixes|fixed|resolves|resolved)\s*:?\s*#\K\d+' \
            "$COMMITS_FILE" >> "$CANDIDATES" || true

          # Nguồn 3: commit messages — bare #N references
          # `(?<![A-Za-z0-9_])` né hex color (#FFAA00), cache key (cache#abc123),
          # v.v. Pattern `(?:^|[^A-Za-z0-9_])` xài thay lookbehind cho grep -P.
          grep -oP '(?:^|[^A-Za-z0-9_])#\K\d+(?![A-Za-z0-9_])' \
            "$COMMITS_FILE" >> "$CANDIDATES" || true

          # Dedup numerical ascending, join bằng dấu phẩy
          ISSUE_NUMBERS=$(grep -v '^$' "$CANDIDATES" | sort -un | paste -sd ',' -)

          echo "issue_numbers=$ISSUE_NUMBERS" >> $GITHUB_OUTPUT
          # Lấy issue đầu cho các step cần single value (project board, title)
          FIRST_ISSUE=$(echo "$ISSUE_NUMBERS" | cut -d',' -f1)
          echo "first_issue=$FIRST_ISSUE" >> $GITHUB_OUTPUT
          echo "Found issues: ${ISSUE_NUMBERS:-(none)}"

          rm -f "$COMMITS_FILE" "$CANDIDATES"

      # -------------------------------------------------------
      # BƯỚC 1B: Expand parent issues → bao gồm cả sub-issues
      #
      # Nếu issue đã extract có sub-issues (GitHub native sub-issue
      # hierarchy), thêm tất cả vào danh sách. Cho phép convention:
      # commit `Closes #parent` → PR auto-close cả parent + children.
      #
      # FALLBACK: Nếu Epic không có native sub-issues (legacy convention
      # — checkbox list `- [ ] #N` trong body), parse body để lấy
      # children. Phải mirror với project-done.yml — nếu không, PR sẽ
      # tạo với chỉ `Closes #parent` rồi project-done cũng không expand
      # được, dẫn tới children stay open mãi.
      #
      # Recursion: BFS qua nhiều level — Epic of Epics vẫn work.
      # -------------------------------------------------------
      - name: Expand parent issues with sub-issues
        id: expand
        if: steps.extract.outputs.issue_numbers != ''
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const initial = '${{ steps.extract.outputs.issue_numbers }}'
              .split(',')
              .map(n => parseInt(n, 10))
              .filter(n => !Number.isNaN(n));

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const expanded = new Set(initial);

            // Helper: parse "- [ ] #N" / "- [x] #N" checkbox refs from
            // an Epic body. Anchored to a list-item line so prose
            // mentions like "see #50 for context" don't get pulled in.
            const parseChecklistChildren = (body) => {
              if (!body) return [];
              const out = new Set();
              const re = /^[-*]\s+\[[ xX]\]\s+#(\d+)\b/gm;
              let m;
              while ((m = re.exec(body)) !== null) {
                out.add(parseInt(m[1], 10));
              }
              return [...out];
            };

            // BFS expand: mỗi vòng query sub-issues của các issue mới thêm.
            // Bảo vệ chống vòng lặp / depth quá lớn bằng `visited`.
            const visited = new Set();
            let frontier = [...initial];

            while (frontier.length > 0) {
              const next = [];
              for (const issueNumber of frontier) {
                if (visited.has(issueNumber)) continue;
                visited.add(issueNumber);
                let foundChildren = [];
                try {
                  const result = await github.graphql(`
                    query($owner: String!, $repo: String!, $issue: Int!) {
                      repository(owner: $owner, name: $repo) {
                        issue(number: $issue) {
                          body
                          subIssues(first: 100) {
                            nodes { number }
                          }
                        }
                      }
                    }
                  `, { owner, repo, issue: issueNumber });

                  const issueData = result.repository?.issue;
                  const subs = issueData?.subIssues?.nodes || [];
                  if (subs.length > 0) {
                    foundChildren = subs.map(s => s.number);
                    console.log(`Issue #${issueNumber} has ${subs.length} native sub-issue(s): [${foundChildren.map(x => '#' + x).join(', ')}]`);
                  } else {
                    // Fallback: checkbox list from body.
                    const fallback = parseChecklistChildren(issueData?.body || '');
                    if (fallback.length > 0) {
                      foundChildren = fallback;
                      console.log(`Issue #${issueNumber} has no native sub-issues; fell back to checklist: [${fallback.map(x => '#' + x).join(', ')}]`);
                    }
                  }
                  for (const sub of foundChildren) {
                    if (!expanded.has(sub)) {
                      expanded.add(sub);
                      next.push(sub);
                    }
                  }
                } catch (err) {
                  // Sub-issues field có thể chưa available trên repo cũ —
                  // fail-soft, dùng list không expand.
                  core.warning(`Could not query sub-issues for #${issueNumber}: ${err.message}`);
                }
              }
              frontier = next;
            }

            const list = [...expanded].sort((a, b) => a - b);
            core.setOutput('issue_numbers', list.join(','));
            core.setOutput('first_issue', list.length > 0 ? String(list[0]) : '');
            console.log(`Final issue list (${list.length}): [${list.join(', ')}]`);

      # -------------------------------------------------------
      # BƯỚC 2: Chuyển TẤT CẢ issue đã link sang "In Progress" trên Project board
      # Dùng GraphQL API vì Project V2 không có REST API
      # PROJECT_NUMBER = 4 (từ URL github.com/users/phuongphh/projects/4)
      # -------------------------------------------------------
      - name: Move issues to In Progress
        if: steps.expand.outputs.issue_numbers != ''
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const issueNumbers = '${{ steps.expand.outputs.issue_numbers }}'
              .split(',')
              .map(n => parseInt(n, 10))
              .filter(n => !Number.isNaN(n));

            const projectNumber = 4;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Lấy Project ID + field Status (1 lần cho tất cả issues)
            const projectQuery = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, number: projectNumber });

            const project = projectQuery.user.projectV2;
            const projectId = project.id;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            const inProgressOption = statusField?.options?.find(o => o.name === 'In Progress');

            if (!statusField || !inProgressOption) {
              core.warning('Could not find Status field or In Progress option on project board');
              return;
            }

            for (const issueNumber of issueNumbers) {
              try {
                const issueQuery = await github.graphql(`
                  query($owner: String!, $repo: String!, $issue: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $issue) {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project { id }
                          }
                        }
                      }
                    }
                  }
                `, { owner, repo, issue: issueNumber });

                const issue = issueQuery.repository.issue;
                if (!issue) {
                  core.warning(`Issue #${issueNumber} not found — skipping`);
                  continue;
                }

                const projectItem = issue.projectItems.nodes
                  .find(item => item.project.id === projectId);

                if (!projectItem) {
                  core.warning(`Issue #${issueNumber} not on project #${projectNumber} — skipping board move`);
                  continue;
                }

                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item { id }
                    }
                  }
                `, {
                  projectId,
                  itemId: projectItem.id,
                  fieldId: statusField.id,
                  optionId: inProgressOption.id
                });
                console.log(`✅ Issue #${issueNumber} moved to In Progress`);
              } catch (err) {
                core.warning(`Failed to move issue #${issueNumber}: ${err.message}`);
              }
            }

      # -------------------------------------------------------
      # BƯỚC 3: Tạo PR với "Closes #N" cho TỪNG issue đã link
      # Dùng gh CLI thay vì peter-evans/create-pull-request
      # vì action đó chỉ output PR number khi tạo mới,
      # không output khi PR đã tồn tại → step link bị skip
      # -------------------------------------------------------
      - name: Create or update Pull Request
        if: steps.expand.outputs.issue_numbers != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBERS: ${{ steps.expand.outputs.issue_numbers }}
          FIRST_ISSUE: ${{ steps.expand.outputs.first_issue }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # Build PR title: "#N" cho 1 issue, "#N1, #N2, ..." cho nhiều
          NUM_COUNT=$(echo "$ISSUE_NUMBERS" | tr ',' '\n' | wc -l)
          if [ "$NUM_COUNT" -eq 1 ]; then
            PR_TITLE="Auto PR from Claude — Issue #${FIRST_ISSUE}"
          else
            ISSUE_TAGS=$(echo "$ISSUE_NUMBERS" | sed 's/,/, #/g')
            PR_TITLE="Auto PR from Claude — Issues #${ISSUE_TAGS}"
            # Cap title length to ~70 chars để không bị cắt trên GitHub UI
            if [ ${#PR_TITLE} -gt 70 ]; then
              PR_TITLE="Auto PR from Claude — Issue #${FIRST_ISSUE} (+$((NUM_COUNT - 1)) more)"
            fi
          fi

          # Build PR body: 1 dòng "Closes #N" cho mỗi issue.
          # GitHub recognise multiple Closes lines → đóng tất cả khi merge.
          CLOSES_LINES=$(echo "$ISSUE_NUMBERS" | tr ',' '\n' | sed 's/^/Closes #/')
          PR_BODY=$(printf 'AI generated implementation\n\n%s\n' "$CLOSES_LINES")

          # Check PR đã tồn tại chưa
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating title + body..."
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
            echo "✅ Updated PR #$EXISTING_PR with $NUM_COUNT Closes line(s)"
          else
            echo "Creating new PR..."
            NEW_PR=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$PR_TITLE" \
              --body "$PR_BODY")
            echo "✅ Created PR: $NEW_PR (linking $NUM_COUNT issue(s))"
          fi

      # Fallback: branch + commits không chứa issue number → tạo PR không link
      - name: Create Pull Request (no issue link)
        if: steps.extract.outputs.issue_numbers == '' || steps.expand.outputs.issue_numbers == ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Auto PR from Claude" \
              --body "AI generated implementation"
            echo "✅ Created PR without issue link"
          else
            echo "PR #$EXISTING_PR already exists, skipping"
          fi
