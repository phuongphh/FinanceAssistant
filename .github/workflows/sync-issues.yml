name: Sync Issues to Markdown

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Export issue to markdown
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const number = context.payload.issue.number;
            const title = context.payload.issue.title || '';
            const body = context.payload.issue.body || '';

            const dir = 'docs/issues';
            fs.mkdirSync(dir, { recursive: true });

            const content = `# Issue #${number}\n\n${title}\n\n${body}\n`;
            const filePath = path.join(dir, `issue-${number}.md`);
            fs.writeFileSync(filePath, content);

            console.log(`Exported issue #${number} to ${filePath}`);

      - name: Commit and push to main
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add docs/issues/
          if git diff --cached --quiet; then
            echo "No changes to commit — file already up to date"
          else
            git commit -m "sync: export issue #${{ github.event.issue.number }}"
            git push origin main
          fi

      - name: Clean up stale sync branch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="sync/issue-${{ github.event.issue.number }}"
          # Close any open PR from the old sync branch
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr close "$PR_NUMBER" --repo "${{ github.repository }}" --comment "Superseded by direct push to main." || true
          fi
          # Delete the stale remote branch
          git push origin --delete "$BRANCH" 2>/dev/null || true
