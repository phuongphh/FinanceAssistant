name: Sync Issues to Markdown

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export issue to markdown
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const number = context.payload.issue.number;
            const title = context.payload.issue.title || '';
            const body = context.payload.issue.body || '';

            const dir = 'docs/issues';
            fs.mkdirSync(dir, { recursive: true });

            const content = `# Issue #${number}\n\n${title}\n\n${body}\n`;
            const filePath = path.join(dir, `issue-${number}.md`);
            fs.writeFileSync(filePath, content);

            console.log(`Exported issue #${number} to ${filePath}`);

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "sync: export issue #${{ github.event.issue.number }}"
          branch: sync/issue-${{ github.event.issue.number }}
          title: "sync: export issue #${{ github.event.issue.number }}"
          body: |
            Auto-sync issue #${{ github.event.issue.number }} to `docs/issues/`.
          labels: sync

      - name: Auto-merge sync PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" \
            --merge --auto \
            --repo "${{ github.repository }}"
